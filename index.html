      const pool = CONFIG.ITEMS.filter(function (i) { return i.id !== 'itm_loot_crate'; });
      const expected = Loot.pickItemOfRarity(rand, Loot.rollRarity(rand), pool);
      const opened = await env.services.loot.openCrate(child.id, 'demo-crate-1');
      t.equal(opened.item.id, expected.id, 'seeded open is deterministic');
      t.ok(opened.item.id !== 'itm_loot_crate', 'crates never drop crates');
      t.equal(await env.services.loot.crateCount(child.id), 1, 'one crate consumed');
      const inv = await env.repos.inventory.listByUser(child.id);
      t.ok(inv.some(function (r) { return r.itemId === opened.item.id && r.qty >= 1; }), 'prize granted');
      await env.services.loot.openCrate(child.id, 'demo-crate-2');
      await t.throwsCode(function () { return env.services.loot.openCrate(child.id); }, 'INSUFFICIENT_ITEMS', 'no crates, no prize');
    } },
    { name: 'game: building upgrades follow the cost curve atomically', db: true, fn: async function (t, env) {
      await env.services.seed.seedIfEmpty();
      const child = await env.repos.users.create({ role: 'CHILD', name: 'Noa' });
      await env.repos.guardians.createForUser(child.id, { name: 'Boop', species: 'BEAR' });
      await env.repos.guardians.applyBundle(child.id, Rewards.normalizeBundle({ coins: 300 }));
      t.equal(env.services.building.costFor('HOME', 0), 100, 'L0 cost');
      t.equal(env.services.building.costFor('HOME', 1), 160, 'L1 cost (×1.6)');
      const u1 = await env.services.building.upgrade(child.id, 'HOME');
      t.equal(u1.cost, 100, 'charged base'); t.equal(u1.guardian.gold, 200, 'gold spent');
      const u2 = await env.services.building.upgrade(child.id, 'HOME');
      t.equal(u2.cost, 160, 'curve applied'); t.equal(u2.building.level, 2, 'level 2');
      const broke = await t.throwsCode(function () { return env.services.building.upgrade(child.id, 'HOME'); }, 'INSUFFICIENT_GOLD', 'cannot afford 256');
      t.equal(broke.cost, 256, 'cost reported');
      const g = await env.repos.guardians.getByUser(child.id);
      t.equal(g.gold, 40, 'gold untouched by failed upgrade');
      await env.repos.buildings.setLevel(child.id, 'RUINS', 5);
      await t.throwsCode(function () { return env.services.building.upgrade(child.id, 'RUINS'); }, 'MAX_LEVEL', 'cap enforced');
      const overview = await env.services.building.overview(child.id);
      t.equal(overview.find(function (b) { return b.type === 'RUINS'; }).nextCost, null, 'maxed shows no next cost');
    } },
    { name: 'game: sanctuary levels raise the guardian energy cap', db: true, fn: async function (t, env) {
      await env.services.seed.seedIfEmpty();
      const child = await env.repos.users.create({ role: 'CHILD', name: 'Rio' });
      await env.repos.guardians.createForUser(child.id, { name: 'Sol', species: 'PHOENIX' });
      await env.repos.guardians.applyBundle(child.id, Rewards.normalizeBundle({ coins: 1000 }));
      await env.services.building.upgrade(child.id, 'SANCTUARY');
      t.equal((await env.repos.guardians.getByUser(child.id)).maxEnergy, 110, '+10 per level');
      await env.services.building.upgrade(child.id, 'SANCTUARY');
      const g = await env.repos.guardians.getByUser(child.id);
      t.equal(g.maxEnergy, 120, 'level 2 cap');
      const filled = await env.repos.guardians.applyBundle(child.id, Rewards.normalizeBundle({ energy: 999 }));
      t.equal(filled.guardian.energy, 120, 'energy clamps at the new cap');
    } },
    { name: 'game: achievements unlock from counters exactly once', db: true, fn: async function (t, env) {
      await env.services.seed.seedIfEmpty();
      const child = await env.repos.users.create({ role: 'CHILD', name: 'Zee' });
      await env.repos.counters.increment(child.id, 'cat.HYDRATION', 1);
      const first = await env.services.achievement.evaluate(child.id);
      t.equal(first.newlyUnlocked.length, 0, 'progress without unlock');
      await env.repos.counters.increment(child.id, 'global.approvals', 1);
      const second = await env.services.achievement.evaluate(child.id);
      t.equal(second.newlyUnlocked.length, 1, 'first approval unlocks First Spark');
      t.equal(second.newlyUnlocked[0].id, 'ach_first_approval', 'correct badge');
      const rows = await env.services.achievement.listForUser(child.id);
      const spark = rows.find(function (r) { return r.def.id === 'ach_first_approval'; });
      t.ok(spark.unlockedAt !== undefined, 'unlock timestamp set');
      const third = await env.services.achievement.evaluate(child.id);
      t.equal(third.newlyUnlocked.length, 0, 'no re-unlock');
      const sparkAgain = (await env.services.achievement.listForUser(child.id)).find(function (r) { return r.def.id === 'ach_first_approval'; });
      t.equal(sparkAgain.unlockedAt, spark.unlockedAt, 'timestamp stable');
    } },
    { name: 'game: approvals advance category streaks alongside the global one', db: true, fn: async function (t, env) {
      await env.services.seed.seedIfEmpty();
      const parent = await env.repos.users.create({ role: 'PARENT', name: 'Michel' });
      const child = await env.repos.users.create({ role: 'CHILD', name: 'Kai' });
      await env.repos.guardians.createForUser(child.id, { name: 'Luno', species: 'OWL' });
      await env.services.auth.setupPin(parent.id, '4321');
      const session = await env.services.auth.verifyPin(parent.id, '4321');
      const s1 = await env.services.quest.submit(child.id, 'qst_water_glass');
      await env.services.approval.approve(session.token, s1.id);
      const s2 = await env.services.quest.submit(child.id, 'qst_brush_teeth');
      await env.services.approval.approve(session.token, s2.id);
      const streaks = await env.repos.streaks.listByUser(child.id);
      function scope(s) { return streaks.find(function (r) { return r.scope === s; }); }
      t.equal(scope('GLOBAL').current, 1, 'global streak (same day stays 1)');
      t.equal(scope('HYDRATION').current, 1, 'hydration streak');
      t.equal(scope('HEALTH').current, 1, 'health streak');
    } },
    { name: 'game: validator demands a result on claimed runs', db: false, fn: async function (t) {
      const base = { id: 'r1', guardianId: 'g1', dungeonId: 'dgn_glade', seed: 1, startedAt: 1, endsAt: 2 };
      await t.throwsCode(function () {
        Validation.validateForStore('dungeonRuns', Object.assign({}, base, { claimed: true }));
      }, 'BAD_SHAPE', 'claimed without result rejected');
      Validation.validateForStore('dungeonRuns', Object.assign({}, base, {
        claimed: true, result: { gold: 5, xp: 8, drops: [{ itemId: 'itm_wood', qty: 1 }] },
      }));
      t.ok(true, 'claimed with result validates');
    } },
    { name: 'game: full loop — submit, approve, raid, claim, achieve, chain intact', db: true, fn: async function (t, env) {
      await env.services.seed.seedIfEmpty();
      const parent = await env.repos.users.create({ role: 'PARENT', name: 'Cristian' });
      const child = await env.repos.users.create({ role: 'CHILD', name: 'Demo Kid' });
      const g = await env.repos.guardians.createForUser(child.id, { name: 'Pip', species: 'FOX' });
      await env.services.auth.setupPin(parent.id, '2468');
      const session = await env.services.auth.verifyPin(parent.id, '2468');
      for (let i = 0; i < 4; i++) {
        const sub = await env.services.quest.submit(child.id, 'qst_water_glass');
        await env.services.approval.approve(session.token, sub.id);
      }
      await t.throwsCode(function () { return env.services.quest.submit(child.id, 'qst_water_glass'); }, 'MAX_PER_DAY_REACHED', '4/day cap holds');
      let guardian = await env.repos.guardians.get(g.id);
      t.equal(guardian.energy, 20, 'four approvals = 20 energy');
      t.equal(guardian.gold, 20, 'and 20 gold');
      const clock = fakeClock(Date.now());
      const dungeon = makeDungeonService(env.repos, { now: function () { return clock.t; } });
      const started = await dungeon.start(g.id, 'dgn_glade');
      clock.tick(10 * 60000 + 1000);
      const claimed = await dungeon.claim(started.run.id);
      guardian = await env.repos.guardians.get(g.id);
      t.equal(guardian.gold, 20 + claimed.run.result.gold, 'raid gold stacked on quest gold');
      const ach = await env.services.achievement.evaluate(child.id);
      t.ok(ach.newlyUnlocked.some(function (d) { return d.id === 'ach_first_approval'; }), 'First Spark unlocked');
      t.equal((await env.repos.counters.get(child.id, 'global.approvals')).value, 4, 'approval counter');
      t.equal((await env.repos.counters.get(child.id, 'global.dungeons')).value, 1, 'dungeon counter');
      const chain = await env.services.integrity.verifyChain();
      t.ok(chain.valid && chain.length === 4, 'four decisions, chain intact');
    } },
  ];

  const TestSuite = {
    count: TESTS.length,
    // makeEnv: async () => { db, repos, services, reset() } — injected by the
    // host (node: memory backend; browser harness: real IndexedDB test DB).
    runAll: async function (makeEnv, onResult) {
      const results = [];
      const env = await makeEnv();
      for (const test of TESTS) {
        const t = makeAssert();
        const started = Date.now();
        let ok = true; let error = null;
        try {
          if (test.db) await env.reset();
          await test.fn(t, env);
        } catch (e) {
          ok = false; error = (e && e.message) || String(e);
        }
        const rec = { name: test.name, ok: ok, ms: Date.now() - started, error: error };
        results.push(rec);
        if (onResult) onResult(rec);
      }
      if (env.close) await env.close();
      return results;
    },
  };

  /* ==========================================================================
     Public surface
     ========================================================================== */
  GOTH.CONFIG = CONFIG;
  GOTH.ENUMS = ENUMS;
  GOTH.SCHEMA = SCHEMA;
  GOTH.STORE_NAMES = STORE_NAMES;
  GOTH.Ids = Ids;
  GOTH.RNG = RNG;
  GOTH.Leveling = Leveling;
  GOTH.Loot = Loot;
  GOTH.TimeUtil = TimeUtil;
  GOTH.Streaks = Streaks;
  GOTH.Rewards = Rewards;
  GOTH.questRewardBundle = questRewardBundle;
  GOTH.canSubmitQuest = canSubmitQuest;
  GOTH.Canon = Canon;
  GOTH.sha256Hex = sha256Hex;
  GOTH.Validation = Validation;
  GOTH.ValidationError = ValidationError;
  GOTH.createIdbBackend = createIdbBackend;
  GOTH.makeDB = makeDB;
  GOTH.makeRepositories = makeRepositories;
  GOTH.makeAuthService = makeAuthService;
  GOTH.makeAuditService = makeAuditService;
  GOTH.makeIntegrityService = makeIntegrityService;
  GOTH.makeApprovalService = makeApprovalService;
  GOTH.makeQuestService = makeQuestService;
  GOTH.makeDungeonService = makeDungeonService;
  GOTH.makeLootService = makeLootService;
  GOTH.makeBuildingService = makeBuildingService;
  GOTH.makeAchievementService = makeAchievementService;
  GOTH.makeServices = makeServices;
  GOTH.TestSuite = TestSuite;

  root.GOTH = GOTH;
})(typeof self !== 'undefined' ? self : globalThis);
</script>
<script type="text/babel" data-presets="react">
/* ============================================================================
   PHASE 4 INSPECTION HARNESS (temporary UI — the real game arrives in Phase 6)
   New this phase: quest daily limits, dungeon expeditions, loot crates,
   building upgrades, achievements — all live against the real database.
   Tests still run in their own database; real data is never touched.
   ========================================================================== */
const { useState, useRef, useEffect } = React;
const G = window.GOTH;

// Dev time control: lets you fast-forward dungeon timers on the harness.
// It shifts the WHOLE game clock, so it also ages parent sessions.
const TIME = { offset: 0 };
function gameNow() { return Date.now() + TIME.offset; }

function deleteDb(name) {
  return new Promise(function (resolve) {
    const req = indexedDB.deleteDatabase(name);
    req.onsuccess = req.onerror = req.onblocked = function () { resolve(); };
  });
}

async function bootMainDb() {
  const backend = G.createIdbBackend(G.CONFIG.DB.name);
  const db = G.makeDB(backend);
  await db.open();
  const repos = G.makeRepositories(db);
  const services = G.makeServices(db, repos, { now: gameNow });
  const seed = await services.seed.seedIfEmpty();
  const recovery = await services.approval.recoverUnfinished();
  const chain = await services.integrity.verifyChain();
  const items = await repos.items.list();
  const itemsById = {};
  items.forEach(function (i) { itemsById[i.id] = i; });
  return { db: db, repos: repos, services: services, seed: seed, recovery: recovery, chain: chain, itemsById: itemsById };
}

async function makeTestEnv() {
  await deleteDb(G.CONFIG.DB.testName);
  const backend = G.createIdbBackend(G.CONFIG.DB.testName);
  const db = G.makeDB(backend);
  await db.open();
  const repos = G.makeRepositories(db);
  const services = G.makeServices(db, repos);
  return {
    db: db, repos: repos, services: services,
    reset: function () { return db.clearAllStores(); },
    close: function () { return db.close(); },
  };
}

function fmtCountdown(ms) {
  const s = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

const DEMO_QUESTS = ['qst_water_glass', 'qst_make_bed', 'qst_help_parent'];

function App() {
  const [boot, setBoot] = useState({ state: 'loading' });
  const [results, setResults] = useState([]);
  const [running, setRunning] = useState(false);
  const [msg, setMsg] = useState(null);
  const [counts, setCounts] = useState(null);
  // Parent gate
  const [gateRevealed, setGateRevealed] = useState(false);
  const [parent, setParent] = useState(null);
  const [hasPin, setHasPin] = useState(false);
  const [parentName, setParentName] = useState('Keeper');
  const [pin, setPin] = useState('');
  const [session, setSession] = useState(null);
  const [gateMsg, setGateMsg] = useState(null);
  const [chain, setChain] = useState(null);
  // Game state
  const [demo, setDemo] = useState(null);
  const [tick, setTick] = useState(0);
  const appRef = useRef(null);
  const fileRef = useRef(null);
  const pressTimer = useRef(null);

  useEffect(function () {
    if (!window.indexedDB) { setBoot({ state: 'noidb' }); return; }
    bootMainDb().then(async function (app) {
      appRef.current = app;
      setChain(app.chain);
      const p = (await app.repos.users.listByRole('PARENT'))[0] || null;
      setParent(p);
      if (p) setHasPin(!!(await app.repos.credentials.getByUser(p.id)));
      await refreshDemo(app);
      setBoot({ state: 'ready', seed: app.seed, recovery: app.recovery });
    }).catch(function (e) {
      setBoot({ state: 'error', error: (e && e.message) || String(e) });
    });
  }, []);

  // 1s heartbeat drives session + dungeon countdowns.
  useEffect(function () {
    if (boot.state !== 'ready') return;
    const id = setInterval(function () { setTick(function (t) { return t + 1; }); }, 1000);
    return function () { clearInterval(id); };
  }, [boot.state]);

  useEffect(function () {
    if (session && gameNow() > session.expiresAt) {
      setSession(null);
      setGateMsg({ kind: 'bad', text: 'Parent session timed out. Unlock again.' });
    }
  }, [tick, session]);

  async function refreshDemo(app) {
    const a = app || appRef.current;
    const childId = await a.repos.meta.get('demo.childId');
    if (!childId) { setDemo(null); return; }
    const child = await a.repos.users.get(childId);
    if (!child) { setDemo(null); return; }
    const guardian = await a.repos.guardians.getByUser(childId);
    const pending = (await a.repos.submissions.listByUserAndStatus(childId, 'PENDING'))
      .sort(function (x, y) { return x.submittedAt - y.submittedAt; });
    const quests = await a.repos.quests.list();
    const questsById = {};
    quests.forEach(function (q) { questsById[q.id] = q; });
    const board = await a.services.quest.listForChild(childId);
    const boardById = {};
    board.forEach(function (b) { boardById[b.quest.id] = b; });
    const streaks = await a.repos.streaks.listByUser(childId);
    const streak = streaks.find(function (s) { return s.scope === 'GLOBAL'; }) || null;
    let dungeonState = null;
    if (guardian) dungeonState = await a.services.dungeon.listForGuardian(guardian.id);
    const crates = await a.services.loot.crateCount(childId);
    const buildings = await a.services.building.overview(childId);
    const achievements = await a.services.achievement.listForUser(childId);
    setDemo({
      child: child, guardian: guardian, pending: pending, questsById: questsById,
      boardById: boardById, streak: streak, dungeonState: dungeonState,
      crates: crates, buildings: buildings, achievements: achievements,
    });
  }

  /* ---- hidden gate: long-press the ember 3 seconds ---- */
  function pressStart() {
    pressTimer.current = setTimeout(function () {
      setGateRevealed(true);
      setGateMsg({ kind: 'ok', text: 'Parent gate revealed.' });
    }, 3000);
  }
  function pressEnd() {
    if (pressTimer.current) { clearTimeout(pressTimer.current); pressTimer.current = null; }
  }

  /* ---- tests / backup / inspect ---- */
  async function runTests() {
    setRunning(true); setResults([]); setMsg(null);
    try {
      const out = [];
      await G.TestSuite.runAll(makeTestEnv, function (r) { out.push(r); setResults(out.slice()); });
    } catch (e) {
      setMsg({ kind: 'bad', text: 'Test runner stopped: ' + ((e && e.message) || e) });
    }
    setRunning(false);
  }
  async function resetTestDb() {
    setMsg(null);
    await deleteDb(G.CONFIG.DB.testName);
    setResults([]);
    setMsg({ kind: 'ok', text: 'Test database deleted. Real data untouched.' });
  }
  async function exportBackup() {
    setMsg(null);
    try {
      const backup = await appRef.current.services.backup.export();
      const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'guardian-hearth-backup-' + G.TimeUtil.todayStr() + '.json';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
      setMsg({ kind: 'ok', text: 'Backup exported. Keep the file somewhere safe.' });
    } catch (e) {
      setMsg({ kind: 'bad', text: 'Export failed: ' + ((e && e.message) || e) });
    }
  }
  function pickImportFile() { if (fileRef.current) fileRef.current.click(); }
  async function onImportFile(ev) {
    const file = ev.target.files && ev.target.files[0];
    ev.target.value = '';
    if (!file) return;
    setMsg(null);
    try {
      const backup = JSON.parse(await file.text());
      const restored = await appRef.current.services.backup.importReplace(backup);
      const total = Object.keys(restored).reduce(function (s, k) { return s + restored[k]; }, 0);
      setCounts(null);
      await refreshDemo();
      setMsg({ kind: 'ok', text: 'Backup verified and restored: ' + total + ' records.' });
    } catch (e) {
      setMsg({ kind: 'bad', text: 'Import refused: ' + ((e && e.message) || e) + '\nNothing was changed.' });
    }
  }
  async function inspectSeed() {
    setMsg(null);
    const out = [];
    for (const s of G.STORE_NAMES) out.push({ store: s, count: await appRef.current.db.count(s) });
    setCounts(out);
  }

  /* ---- parent gate actions ---- */
  function gateError(e) {
    if (e && e.code === 'LOCKED_OUT') {
      setGateMsg({ kind: 'bad', text: 'Locked out. Try again in ' + Math.ceil((e.retryInMs || 0) / 1000) + 's.' });
    } else if (e && e.code === 'WRONG_PIN') {
      setGateMsg({ kind: 'bad', text: 'Incorrect PIN. ' + e.attemptsLeft + ' attempt' + (e.attemptsLeft === 1 ? '' : 's') + ' left before lockout.' });
    } else {
      setGateMsg({ kind: 'bad', text: (e && e.message) || String(e) });
    }
  }
  async function createParentWithPin() {
    setGateMsg(null);
    try {
      const a = appRef.current;
      const p = await a.repos.users.create({ role: 'PARENT', name: parentName || 'Keeper', avatar: '🛡️' });
      await a.services.auth.setupPin(p.id, pin);
      setParent(p); setHasPin(true); setPin('');
      setGateMsg({ kind: 'ok', text: 'Parent created and PIN set (PBKDF2-SHA256, 310k iterations). Now unlock with it.' });
    } catch (e) { gateError(e); }
  }
  async function setPinForParent() {
    setGateMsg(null);
    try {
      await appRef.current.services.auth.setupPin(parent.id, pin);
      setHasPin(true); setPin('');
      setGateMsg({ kind: 'ok', text: 'PIN set. Now unlock with it.' });
    } catch (e) { gateError(e); }
  }
  async function unlock() {
    setGateMsg(null);
    try {
      const s = await appRef.current.services.auth.verifyPin(parent.id, pin);
      setSession(s); setPin('');
      setGateMsg({ kind: 'ok', text: 'Parent mode unlocked. Session expires after 5 idle minutes.' });
    } catch (e) { gateError(e); }
  }
  function lockNow() {
    if (session) appRef.current.services.auth.endSession(session.token);
    setSession(null);
    setGateMsg({ kind: 'ok', text: 'Locked. The approval gate is closed.' });
  }
  async function verifyChainNow() {
    setGateMsg(null);
    const report = await appRef.current.services.integrity.verifyChain();
    setChain(report);
    setGateMsg(report.valid
      ? { kind: 'ok', text: 'Audit chain VALID — ' + report.length + ' entries verified back to GENESIS.' }
      : { kind: 'bad', text: 'Audit chain INVALID (' + report.reason + ') — verified ' + report.verified + ' of ' + report.length + '.' });
  }
  async function recoverNow() {
    setGateMsg(null);
    const r = await appRef.current.services.approval.recoverUnfinished();
    await refreshDemo();
    setGateMsg({ kind: 'ok', text: r.recovered === 0 ? 'Nothing to recover — all approvals fully applied.' : 'Recovered ' + r.recovered + ' interrupted reward release(s).' });
  }
  async function removeDemo() {
    setGateMsg(null);
    const a = appRef.current;
    const childId = await a.repos.meta.get('demo.childId');
    if (childId) {
      try { await a.repos.users.removeCascade(childId); } catch (e) { /* already gone */ }
      await a.repos.meta.set('demo.childId', '');
    }
    await refreshDemo();
    setGateMsg({ kind: 'ok', text: 'Demo child removed (audit history retained by design).' });
  }

  /* ---- game actions ---- */
  async function evaluateAchievements(childId) {
    const res = await appRef.current.services.achievement.evaluate(childId);
    if (res.newlyUnlocked.length) {
      setMsg({ kind: 'ok', text: '🏅 Achievement unlocked: ' + res.newlyUnlocked.map(function (d) { return d.name; }).join(', ') });
    }
    return res;
  }
  async function createDemoChild() {
    setMsg(null);
    const a = appRef.current;
    const child = await a.repos.users.create({ role: 'CHILD', name: 'Demo Kid', avatar: '🧒' });
    await a.repos.guardians.createForUser(child.id, { name: 'Pip', species: 'FOX' });
    await a.repos.meta.set('demo.childId', child.id);
    await refreshDemo();
  }
  async function submitQuest(questId) {
    setMsg(null);
    try {
      await appRef.current.services.quest.submit(demo.child.id, questId);
      await refreshDemo();
    } catch (e) {
      setMsg({ kind: 'bad', text: (e && e.message) || String(e) });
    }
  }
  async function decide(subId, kind) {
    setMsg(null);
    try {
      const svc = appRef.current.services;
      if (kind === 'APPROVE') {
        const r = await svc.approval.approve(session.token, subId);
        setMsg({ kind: 'ok', text: r.leveledUp ? 'Approved — rewards released. LEVEL UP to ' + r.guardian.level + '! 🎉' : 'Approved — rewards released to ' + r.guardian.name + '.' });
        await evaluateAchievements(demo.child.id);
      } else {
        await svc.approval.reject(session.token, subId, 'not quite yet');
        setMsg({ kind: 'ok', text: 'Rejected — nothing was granted.' });
      }
      const fresh = svc.auth.getSession(session.token);
      if (fresh) setSession(fresh);
      await refreshDemo();
      setChain(await svc.integrity.verifyChain());
    } catch (e) {
      if (e && (e.code === 'SESSION_EXPIRED' || e.code === 'SESSION_INVALID')) {
        setSession(null);
        setGateMsg({ kind: 'bad', text: 'Parent session ended — unlock again to decide.' });
      } else {
        setMsg({ kind: 'bad', text: (e && e.message) || String(e) });
      }
    }
  }
  async function startDungeon(dungeonId) {
    setMsg(null);
    try {
      const r = await appRef.current.services.dungeon.start(demo.guardian.id, dungeonId);
      setMsg({ kind: 'ok', text: 'Expedition started! ' + demo.guardian.name + ' paid ' + r.energyCost + ' ⚡ and is on the way.' });
      await refreshDemo();
    } catch (e) {
      setMsg({ kind: 'bad', text: (e && e.message) || String(e) });
    }
  }
  async function claimDungeon(runId) {
    setMsg(null);
    try {
      const a = appRef.current;
      const r = await a.services.dungeon.claim(runId);
      const drops = r.run.result.drops.map(function (d) {
        const item = a.itemsById[d.itemId];
        return (item ? item.name : d.itemId) + ' ×' + d.qty;
      }).join(', ');
      setMsg({ kind: 'ok', text: '🎒 Expedition complete! +' + r.run.result.gold + ' gold · +' + r.run.result.xp + ' xp · ' + (drops || 'no drops') + (r.leveledUp ? ' · LEVEL UP! 🎉' : '') });
      await evaluateAchievements(demo.child.id);
      await refreshDemo();
    } catch (e) {
      if (e && e.code === 'RUN_NOT_FINISHED') {
        setMsg({ kind: 'bad', text: 'Still underway — ' + fmtCountdown(e.remainingMs) + ' to go. (Use fast-forward below to test.)' });
      } else {
        setMsg({ kind: 'bad', text: (e && e.message) || String(e) });
      }
    }
  }
  async function openCrate() {
    setMsg(null);
    try {
      const r = await appRef.current.services.loot.openCrate(demo.child.id);
      setMsg({ kind: 'ok', text: '📦 Crate opened: ' + r.item.name + ' (' + r.rarity + ')!' });
      await refreshDemo();
    } catch (e) {
      setMsg({ kind: 'bad', text: (e && e.message) || String(e) });
    }
  }
  async function upgradeBuilding(type) {
    setMsg(null);
    try {
      const r = await appRef.current.services.building.upgrade(demo.child.id, type);
      setMsg({ kind: 'ok', text: '🔨 ' + r.building.type + ' upgraded to level ' + r.building.level + ' for ' + r.cost + ' gold.' + (type === 'SANCTUARY' ? ' Max energy is now ' + r.guardian.maxEnergy + ' ⚡.' : '') });
      await refreshDemo();
    } catch (e) {
      setMsg({ kind: 'bad', text: (e && e.message) || String(e) });
    }
  }
  async function skipTime(ms) {
    TIME.offset += ms;
    await refreshDemo();
    setTick(function (t) { return t + 1; });
  }

  const passed = results.filter(function (r) { return r.ok; }).length;
  const failed = results.length - passed;
  const done = !running && results.length > 0;
  const sessionLeft = session ? session.expiresAt - gameNow() : 0;
  const dz = demo && demo.dungeonState;
  const activeRun = dz ? dz.activeRun : null;

  return (
    <div className="wrap">
      <div className="eyebrow">Phase 4 · Keeper's Inspection</div>
      <h1
        onPointerDown={pressStart}
        onPointerUp={pressEnd}
        onPointerLeave={pressEnd}
        onPointerCancel={pressEnd}
        onContextMenu={function (e) { e.preventDefault(); }}
        style={{ userSelect: 'none', WebkitUserSelect: 'none', WebkitTouchCallout: 'none', cursor: 'pointer' }}
      >
        <span className="ember" aria-hidden="true"></span>Guardian of the Hearth
      </h1>
      <p className="sub">Game engine: quests · dungeons · loot · buildings · achievements</p>

      {boot.state === 'loading' && (
        <div className="card"><h2>Lighting the hearth…</h2><p className="note">Opening the database, recovering, verifying the chain.</p></div>
      )}

      {boot.state === 'noidb' && (
        <div className="card">
          <h2>This preview can't store data</h2>
          <p className="note">IndexedDB isn't available in this sandbox. Deploy to Netlify and open the live link — everything runs on-device there.</p>
        </div>
      )}

      {boot.state === 'error' && (
        <div className="card"><h2>The hearth didn't light</h2><div className="msg bad">{boot.error}</div></div>
      )}

      {boot.state === 'ready' && (
        <React.Fragment>
          <div className="card">
            <h2>Inspection ledger</h2>
            <div className="summary">
              <span className="chip">{G.TestSuite.count} checks</span>
              {results.length > 0 && <span className="chip pass">{passed} passed</span>}
              {failed > 0 && <span className="chip fail">{failed} failed</span>}
              {running && <span className="chip">running…</span>}
              {done && failed === 0 && <span className="chip pass">all clear ✓</span>}
              {chain && <span className={'chip ' + (chain.valid ? 'pass' : 'fail')}>{chain.valid ? 'chain VALID · ' + chain.length : 'chain BROKEN'}</span>}
            </div>
            <div className="btnrow">
              <button className="primary" onClick={runTests} disabled={running}>
                {running ? 'Inspecting… (PIN tests take a moment)' : 'Run all tests'}
              </button>
              <button onClick={resetTestDb} disabled={running}>Reset test data</button>
              <button onClick={inspectSeed} disabled={running}>Inspect seed data</button>
            </div>
            {results.length > 0 && (
              <ul className="ledger" style={{ marginTop: 12 }}>
                {results.map(function (r, i) {
                  return (
                    <li key={i} className={r.ok ? '' : 'fail'}>
                      <span className="row">{(r.ok ? '✓ ' : '✕ ') + r.name}{!r.ok && <span className="err">{r.error}</span>}</span>
                      <span className="ms">{r.ms}ms</span>
                    </li>
                  );
                })}
              </ul>
            )}
          </div>

          <div className="card">
            <h2>Quest board</h2>
            {!demo && (
              <React.Fragment>
                <p className="note" style={{ marginTop: 0 }}>Create a demo child to play the full loop: submit → parent approves → rewards → raid → loot.</p>
                <div className="btnrow"><button className="primary" onClick={createDemoChild}>Create demo child + guardian</button></div>
              </React.Fragment>
            )}
            {demo && demo.guardian && (
              <React.Fragment>
                <p className="note" style={{ marginTop: 0 }}>
                  🦊 <b style={{ color: 'var(--ink)' }}>{demo.guardian.name}</b> · Lv {demo.guardian.level} · ✦ {demo.guardian.gold} ·
                  ⚡ {demo.guardian.energy}/{demo.guardian.maxEnergy} · ♥ {demo.guardian.affection} ·
                  XP {demo.guardian.xp} · 🔥 {demo.streak ? demo.streak.current : 0}
                </p>
                <div className="btnrow">
                  {DEMO_QUESTS.map(function (qid) {
                    const q = demo.questsById[qid];
                    const b = demo.boardById[qid];
                    const left = b ? b.remainingToday : 0;
                    return (
                      <button key={qid} onClick={function () { submitQuest(qid); }} disabled={left === 0}>
                        {q.icon} {q.title} ({left} left)
                      </button>
                    );
                  })}
                </div>
                {demo.pending.length === 0 && <p className="note">No pending submissions. Submitting grants nothing by itself — rewards wait for the parent.</p>}
                {demo.pending.length > 0 && (
                  <ul className="ledger" style={{ marginTop: 12 }}>
                    {demo.pending.map(function (s) {
                      const q = demo.questsById[s.questId] || { title: s.questId, icon: '⭐' };
                      return (
                        <li key={s.id}>
                          <span className="row">
                            {q.icon} {q.title} — PENDING
                            {session ? (
                              <span style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                                <button className="mini" onClick={function () { decide(s.id, 'APPROVE'); }}>Approve</button>
                                <button className="mini" onClick={function () { decide(s.id, 'REJECT'); }}>Reject</button>
                              </span>
                            ) : (
                              <span className="err" style={{ color: 'var(--dim)' }}>Awaiting a parent. Deciding requires parent mode.</span>
                            )}
                          </span>
                        </li>
                      );
                    })}
                  </ul>
                )}
              </React.Fragment>
            )}
          </div>

          {demo && demo.guardian && dz && (
            <div className="card">
              <h2>Dungeons</h2>
              {dz.dungeons.map(function (d) {
                const isActive = activeRun && activeRun.dungeonId === d.def.id;
                const remaining = isActive ? activeRun.endsAt - gameNow() : 0;
                return (
                  <div className="rowline" key={d.def.id}>
                    <span className="grow">
                      {d.def.name} <span className="dim">· {d.def.tier} · {d.def.durationMin}m · {d.energyCost}⚡</span>
                      {!d.unlocked && <span className="dim"> · 🔒 Lv {d.def.unlockLevel}</span>}
                    </span>
                    {isActive && remaining > 0 && <span className="dim">⏳ {fmtCountdown(remaining)}</span>}
                    {isActive && remaining <= 0 && <button className="mini" onClick={function () { claimDungeon(activeRun.id); }}>Claim 🎒</button>}
                    {!isActive && d.unlocked && !activeRun && (
                      <button className="mini" onClick={function () { startDungeon(d.def.id); }} disabled={demo.guardian.energy < d.energyCost}>Start</button>
                    )}
                    {!isActive && activeRun && <span className="dim">expedition out</span>}
                  </div>
                );
              })}
              <div className="btnrow" style={{ marginTop: 10 }}>
                <button onClick={function () { skipTime(10 * 60000); }}>⏩ Skip 10 min</button>
                <button onClick={function () { skipTime(60 * 60000); }}>⏩ Skip 1 hour</button>
              </div>
              <p className="note">Fast-forward is a dev control for testing timers — it ages parent sessions too.</p>
            </div>
          )}

          {demo && demo.guardian && (
            <div className="card">
              <h2>Workshop &amp; island</h2>
              <div className="rowline">
                <span className="grow">📦 Mystery Loot Crates <span className="dim">· {demo.crates} held</span></span>
                <button className="mini" onClick={openCrate} disabled={demo.crates === 0}>Open one</button>
              </div>
              {demo.buildings.map(function (b) {
                return (
                  <div className="rowline" key={b.type}>
                    <span className="grow">
                      🏗️ {b.name} <span className="dim">· Lv {b.level}/{b.maxLevel}{b.type === 'SANCTUARY' ? ' · +10⚡ cap per level' : ''}</span>
                    </span>
                    {b.nextCost !== null
                      ? <button className="mini" onClick={function () { upgradeBuilding(b.type); }} disabled={demo.guardian.gold < b.nextCost}>{b.nextCost} ✦</button>
                      : <span className="dim">MAX</span>}
                  </div>
                );
              })}
            </div>
          )}

          {demo && demo.achievements && demo.achievements.length > 0 && (
            <div className="card">
              <h2>Achievements</h2>
              {demo.achievements.map(function (a) {
                const pct = Math.min(100, Math.round((a.progress / a.target) * 100));
                return (
                  <div key={a.def.id} style={{ padding: '7px 2px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
                      <span>{a.unlockedAt !== undefined ? '🏅 ' : ''}{a.def.name}</span>
                      <span className="dim">{a.progress}/{a.target}</span>
                    </div>
                    <div className="bar"><span style={{ width: pct + '%' }}></span></div>
                  </div>
                );
              })}
            </div>
          )}

          {(gateRevealed || session) && (
            <div className="card" style={{ borderColor: 'rgba(232,133,61,0.55)' }}>
              <h2>Parent gate 🛡️</h2>
              {!parent && (
                <React.Fragment>
                  <p className="note" style={{ marginTop: 0 }}>No parent account exists yet. Create one and set a PIN (4–12 digits).</p>
                  <input className="field" value={parentName} onChange={function (e) { setParentName(e.target.value); }} placeholder="Parent name" maxLength={24} />
                  <input className="field" type="password" inputMode="numeric" autoComplete="off" value={pin} onChange={function (e) { setPin(e.target.value); }} placeholder="Choose a PIN" maxLength={12} />
                  <div className="btnrow"><button className="primary" onClick={createParentWithPin}>Create parent &amp; set PIN</button></div>
                </React.Fragment>
              )}
              {parent && !hasPin && (
                <React.Fragment>
                  <p className="note" style={{ marginTop: 0 }}>{parent.name} has no PIN yet.</p>
                  <input className="field" type="password" inputMode="numeric" autoComplete="off" value={pin} onChange={function (e) { setPin(e.target.value); }} placeholder="Choose a PIN (4–12 digits)" maxLength={12} />
                  <div className="btnrow"><button className="primary" onClick={setPinForParent}>Set PIN</button></div>
                </React.Fragment>
              )}
              {parent && hasPin && !session && (
                <React.Fragment>
                  <p className="note" style={{ marginTop: 0 }}>Unlock parent mode for {parent.name}. Three wrong attempts lock the gate for 60s, doubling each time.</p>
                  <input className="field" type="password" inputMode="numeric" autoComplete="off" value={pin} onChange={function (e) { setPin(e.target.value); }} placeholder="Enter PIN" maxLength={12} />
                  <div className="btnrow"><button className="primary" onClick={unlock}>Unlock</button></div>
                </React.Fragment>
              )}
              {session && (
                <React.Fragment>
                  <div className="summary">
                    <span className="chip pass">unlocked · {fmtCountdown(sessionLeft)} left</span>
                    {chain && <span className={'chip ' + (chain.valid ? 'pass' : 'fail')}>{chain.valid ? 'chain VALID' : 'chain ' + chain.reason}</span>}
                  </div>
                  <div className="btnrow">
                    <button onClick={lockNow}>Lock now</button>
                    <button onClick={verifyChainNow}>Verify audit chain</button>
                    <button onClick={recoverNow}>Recover rewards</button>
                    <button onClick={removeDemo}>Remove demo data</button>
                  </div>
                  <p className="note">Every decision is appended to the hash chain. Each use extends the session; idle 5 minutes and it locks itself.</p>
                </React.Fragment>
              )}
              {gateMsg && <div className={'msg ' + (gateMsg.kind === 'ok' ? 'ok' : 'bad')}>{gateMsg.text}</div>}
            </div>
          )}

          <div className="card">
            <h2>Backup &amp; restore</h2>
            <p className="note" style={{ marginTop: 0, marginBottom: 10 }}>
              {boot.seed && boot.seed.seeded ? 'Fresh install: catalog seeded.' : 'Existing install detected.'}
              {boot.recovery && boot.recovery.recovered > 0 ? ' Recovered ' + boot.recovery.recovered + ' interrupted reward(s) at boot.' : ''}
              {' '}Backups are checksummed — a modified file is refused before anything is written.
            </p>
            <div className="btnrow">
              <button onClick={exportBackup}>Export backup</button>
              <button onClick={pickImportFile}>Import backup</button>
            </div>
            <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: 'none' }} onChange={onImportFile} />
          </div>

          {counts && (
            <div className="card">
              <h2>Seed inspection — {G.CONFIG.DB.name}</h2>
              <table className="counts"><tbody>
                {counts.map(function (c) { return (<tr key={c.store}><td>{c.store}</td><td>{c.count}</td></tr>); })}
              </tbody></table>
            </div>
          )}

          {msg && <div className={'msg ' + (msg.kind === 'ok' ? 'ok' : 'bad')}>{msg.text}</div>}
        </React.Fragment>
      )}

      <footer>
        <b>Build GOTH-P4.1</b> — Phase 4 of 7. Parent gate: long-press the ember for 3 seconds.
        This inspection screen is temporary; the real game UI (with your painted art) arrives
        in Phase 6. Next phase: state management — the store that drives the whole interface.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
