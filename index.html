<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#1A1410" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Guardian" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
<title>Guardian of the Hearth</title>
<style>
  :root {
    --bg: #1A1410;            /* Hearthwood */
    --panel: #241B14;         /* Inglenook */
    --panel-2: #2C2218;
    --edge: #3A2C1F;
    --ink: #EDE3D2;           /* Candlelight */
    --dim: #8A7A66;           /* Ash */
    --ember: #E8853D;
    --ember-deep: #B85F1E;
    --gold: #E0B45C;
    --moss: #7FB069;
    --brick: #C75146;
    --r-common: #9AA0A6; --r-uncommon: #7FB069; --r-rare: #5B9BD5;
    --r-epic: #9B6DD7; --r-legendary: #E0B45C; --r-mythic: #E85D75;
    --display: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    --tabbar-h: 64px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body);
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior-y: none;
  }
  button { font: inherit; color: inherit; }
  img { display: block; }

  /* ---------- type ---------- */
  .display { font-family: var(--display); font-weight: 600; letter-spacing: 0.01em; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--dim); font-weight: 600;
  }
  h1, h2, h3 { font-family: var(--display); margin: 0; font-weight: 600; }
  h2 { font-size: 19px; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* ---------- app frame ---------- */
  #root { min-height: 100dvh; }
  .screen-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      linear-gradient(180deg, rgba(26,20,16,0.82) 0%, rgba(26,20,16,0.62) 38%, rgba(26,20,16,0.94) 100%),
      radial-gradient(1100px 520px at 50% -120px, #33241636, transparent 70%),
      var(--bg);
    background-size: cover; background-position: center top;
  }
  .screen-bg.home { background-image:
      linear-gradient(180deg, rgba(26,20,16,0.80) 0%, rgba(26,20,16,0.58) 40%, rgba(26,20,16,0.95) 100%),
      url('./bg-home.jpg'); }
  .screen-bg.raids { background-image:
      linear-gradient(180deg, rgba(20,14,22,0.82) 0%, rgba(20,14,22,0.60) 40%, rgba(26,20,16,0.96) 100%),
      url('./bg-dungeon.jpg'); }
  .shell {
    position: relative; z-index: 1;
    max-width: 560px; margin: 0 auto;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: max(10px, env(safe-area-inset-top)) 14px 0;
  }
  .shell-main {
    flex: 1;
    padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 18px);
    animation: screenIn 260ms ease both;
  }
  @keyframes screenIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ---------- header & the living ember ---------- */
  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 6px 2px 12px;
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
  }
  .hdr-title {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--display); font-size: 19px; font-weight: 600;
    touch-action: none; cursor: pointer;
  }
  .ember {
    width: 13px; height: 13px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #FFD9A8, var(--ember) 55%, var(--ember-deep));
    box-shadow: 0 0 12px 3px rgba(232,133,61,0.55);
    animation: emberPulse 2.6s ease-in-out infinite;
    flex: 0 0 auto;
  }
  @keyframes emberPulse {
    0%, 100% { box-shadow: 0 0 10px 2px rgba(232,133,61,0.45); transform: scale(1); }
    50% { box-shadow: 0 0 16px 5px rgba(232,133,61,0.75); transform: scale(1.12); }
  }
  .ember.holding {
    animation: none;
    box-shadow: 0 0 26px 10px rgba(232,133,61,0.95);
    transform: scale(1.45);
    transition: box-shadow 2.8s ease-in, transform 2.8s ease-in;
  }
  .hdr-kid {
    display: flex; align-items: center; gap: 6px;
    background: rgba(36,27,20,0.85); border: 1px solid var(--edge);
    border-radius: 999px; padding: 6px 12px; font-size: 13px;
    min-height: 38px;
  }

  /* ---------- cards ---------- */
  .card {
    background: linear-gradient(180deg, rgba(44,34,24,0.92), rgba(36,27,20,0.92));
    border: 1px solid var(--edge);
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 14px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }
  .card h2 { margin-bottom: 10px; }
  .note { color: var(--dim); font-size: 13px; margin: 6px 0 0; }

  /* ---------- guardian hero ---------- */
  .hero { padding: 0; overflow: hidden; }
  .hero-art {
    position: relative; aspect-ratio: 1 / 1; max-height: 330px;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(420px 420px at 50% 42%, #3A2A1A, #221A12 75%);
  }
  .hero-art img { width: 100%; height: 100%; object-fit: cover; }
  .hero-art .fallback { font-size: 110px; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.5)); }
  .hero-art::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(26,20,16,0.92) 100%);
  }
  .hero-name {
    position: absolute; left: 14px; right: 14px; bottom: 10px; z-index: 2;
    display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
  }
  .hero-name .display { font-size: 26px; text-shadow: 0 2px 10px rgba(0,0,0,0.7); }
  .lv-pill {
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    background: rgba(26,20,16,0.8); border: 1px solid var(--ember-deep);
    color: var(--gold); border-radius: 999px; padding: 4px 10px;
  }
  .hero-body { padding: 12px 14px 14px; }
  .xp-bar { height: 10px; border-radius: 999px; background: #14100C; border: 1px solid var(--edge); overflow: hidden; }
  .xp-bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--ember-deep), var(--ember) 60%, #FFC97F);
    transition: width 600ms cubic-bezier(.22,1,.36,1);
  }
  .xp-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-top: 5px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(20,16,12,0.7); border: 1px solid var(--edge);
    border-radius: 999px; padding: 6px 11px; font-size: 13px;
  }
  .chip b { font-family: var(--mono); font-weight: 700; }
  .chip.gold b { color: var(--gold); }
  .chip.energy b { color: #FFC97F; }
  .chip.heart b { color: #E89BB5; }
  .chip.streak b { color: var(--ember); }

  /* ---------- buttons ---------- */
  button.btn {
    min-height: 48px; padding: 11px 16px;
    background: var(--panel-2); border: 1px solid var(--edge);
    border-radius: 14px; font-size: 14px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    cursor: pointer;
  }
  button.btn:active { transform: scale(0.97); }
  button.btn.primary {
    background: linear-gradient(180deg, var(--ember), var(--ember-deep));
    border-color: #8F4715; color: #1C0F05;
  }
  button.btn:disabled { opacity: 0.42; }
  button.mini {
    min-height: 40px; padding: 8px 13px; font-size: 13px; font-weight: 600;
    background: var(--panel-2); border: 1px solid var(--edge); border-radius: 11px;
  }
  button.mini.go { background: linear-gradient(180deg, var(--ember), var(--ember-deep)); border-color: #8F4715; color: #1C0F05; }
  .btnrow { display: flex; flex-wrap: wrap; gap: 9px; }
  .btnrow > .btn { flex: 1 1 auto; }
  input.field {
    width: 100%; min-height: 48px; padding: 11px 13px; margin: 7px 0;
    background: #16100B; border: 1px solid var(--edge); border-radius: 13px;
    color: var(--ink); font-size: 16px;
  }
  input.field:focus-visible, button:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }

  /* ---------- quests ---------- */
  .q-card { position: relative; display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 15px;
    background: rgba(20,16,12,0.55); border: 1px solid var(--edge); margin-bottom: 9px; overflow: visible; }
  .qp { position: absolute; left: 50%; top: 40%; z-index: 5; font-size: 18px; pointer-events: none;
    animation: qFly 0.9s ease-out both; }
  @keyframes qFly {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.55) rotate(18deg); opacity: 0; }
  }
  button.mini.sentok { background: linear-gradient(180deg, var(--moss), #5C8A4D); border-color: #46703B; color: #10210D; }
  .q-icon.rock { display: inline-block; animation: iconRock 5.5s ease-in-out infinite; }
  .q-card:nth-child(3n+1) .q-icon.rock { animation-delay: 0.6s; }
  .q-card:nth-child(3n+2) .q-icon.rock { animation-delay: 1.4s; }
  @keyframes iconRock {
    0%, 86%, 100% { transform: rotate(0); }
    90% { transform: rotate(-9deg); } 94% { transform: rotate(8deg); } 97% { transform: rotate(-4deg); }
  }
  .stamp { position: absolute; right: 86px; top: 50%; z-index: 6; font-size: 11px; font-weight: 800;
    letter-spacing: 0.08em; color: #10210D; background: var(--moss); border: 2px solid #46703B;
    border-radius: 8px; padding: 3px 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    animation: stampIn 0.45s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes stampIn {
    0% { transform: translateY(-50%) rotate(-30deg) scale(2.2); opacity: 0; }
    60% { opacity: 1; }
    100% { transform: translateY(-50%) rotate(-12deg) scale(1); }
  }
  .flight { position: fixed; z-index: 60; font-size: 22px; pointer-events: none;
    animation: flyToTab 0.75s cubic-bezier(.4,0,.8,1) both; }
  @keyframes flyToTab {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.35); opacity: 0; }
  }
  .cat-bar { flex: 1; height: 5px; border-radius: 999px; background: #14100C;
    border: 1px solid var(--edge); overflow: hidden; }
  .cat-bar i { display: block; height: 100%;
    background: linear-gradient(90deg, var(--ember-deep), var(--gold)); transition: width 0.6s ease; }
  .qpet { display: inline-flex; width: 46px; height: 46px; border-radius: 50%; overflow: hidden;
    border: 2px solid var(--ember); box-shadow: 0 0 12px rgba(232,133,61,0.6); background: #1C1510; flex: 0 0 auto; }
  .qpet img { width: 100%; height: 100%; object-fit: cover; }
  .qpet .fallback { display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; font-size: 22px; }
  .qpet.hop { animation: petHop 0.6s cubic-bezier(.34,1.56,.64,1); }
  .proud { position: fixed; inset: 0; z-index: 48; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; pointer-events: none; }
  .proud-pet { width: 150px; height: 150px; border-radius: 50%; overflow: hidden;
    border: 3px solid var(--ember); background: #1C1510;
    box-shadow: 0 0 50px rgba(232,133,61,0.75), 0 14px 40px rgba(0,0,0,0.6);
    animation: proudIn 0.4s cubic-bezier(.2,1.5,.4,1) both, petHop 0.65s 0.35s cubic-bezier(.34,1.56,.64,1); }
  .proud-pet img { width: 100%; height: 100%; object-fit: cover; }
  .proud-pet .fallback { display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; font-size: 64px; }
  @keyframes proudIn { from { transform: scale(0.3) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .proud-text { font-family: var(--display); font-size: 20px; font-weight: 600; text-align: center;
    color: var(--ink); background: rgba(26,20,16,0.88); border: 1px solid #6B5326;
    border-radius: 999px; padding: 9px 20px; text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    box-shadow: 0 8px 26px rgba(0,0,0,0.5); animation: proudIn 0.4s 0.1s cubic-bezier(.2,1.5,.4,1) both; }
  .proud .emote { position: absolute; top: 32%; }
  /* ---------- the First Flame ---------- */
  .flame-row { display: flex; align-items: center; gap: 12px; }
  .flame-orb { position: relative; flex: 0 0 auto; width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; background: #14100C;
    border: 1px solid #6B5326; }
  .flame-orb .fl { border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #FFE9B0, #E8853D 55%, #B85F1E 80%);
    animation: emberPulse 2.4s ease-in-out infinite; }
  .flame-stagename { font-family: var(--display); font-size: 17px; }
  .flame-bar { height: 9px; border-radius: 999px; background: #14100C; border: 1px solid #6B5326;
    overflow: hidden; margin-top: 6px; }
  .flame-bar > span { display: block; height: 100%;
    background: linear-gradient(90deg, #B85F1E, var(--gold)); transition: width 600ms ease; }
  .island-shrine { position: absolute; z-index: 2; transform: translate(-50%, -50%); border-radius: 50%;
    background: radial-gradient(circle, #FFE9B0, #E8853D 55%, transparent 75%);
    animation: emberPulse 2.2s ease-in-out infinite; pointer-events: none; }
  .wlist { list-style: none; margin: 8px 0 0; padding: 0; }
  .wlist li { font-family: var(--display); font-style: italic; font-size: 15px; line-height: 1.5;
    padding: 10px 2px; border-bottom: 1px dashed #2A2018; color: #E8D9C0; }
  .wlist li:last-child { border-bottom: none; }
  .wlist li.locked { color: var(--dim); font-style: normal; font-size: 13px; }
  .cele-flame { font-size: 64px; animation: burst 900ms ease both, emberPulse 2s 0.9s ease-in-out infinite; }
  .vlist { list-style: none; margin: 10px 0 0; padding: 0; max-height: 44dvh; overflow-y: auto; }
  .vlist li { display: flex; align-items: center; gap: 8px; padding: 13px 10px; font-size: 16px;
    border-bottom: 1px solid #2A2018; border-radius: 10px; cursor: pointer; }
  .vlist li:active { background: #2A2018; }
  .vlist li.cur { background: #241B14; border: 1px solid var(--ember-deep); }
  .qd { display: inline-flex; gap: 3px; margin-right: 7px; vertical-align: middle; }
  .qd i { width: 6px; height: 6px; border-radius: 50%; background: #3A2C1F; }
  .qd i.on { background: var(--gold); box-shadow: 0 0 5px rgba(224,180,92,0.6); }
  .q-icon { font-size: 26px; width: 40px; text-align: center; flex: 0 0 auto; }
  .q-main { flex: 1; min-width: 0; }
  .q-title { font-weight: 600; font-size: 14px; }
  .q-sub { font-size: 12px; color: var(--dim); }
  .cat-label { display: flex; align-items: center; gap: 8px; margin: 14px 2px 8px; }
  .cat-label .eyebrow { letter-spacing: 0.18em; }
  .cat-rule { flex: 1; height: 1px; background: var(--edge); }
  .pend-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px;
    border-bottom: 1px solid #2A2018; font-size: 13px; }
  .pend-row:last-child { border-bottom: none; }
  .badge-wait { font-size: 11px; color: var(--gold); border: 1px solid #6B5326;
    border-radius: 999px; padding: 2px 8px; }

  /* ---------- dungeons ---------- */
  .d-card { position: relative; border-radius: 17px; overflow: hidden;
    border: 1px solid var(--edge); margin-bottom: 12px; background: var(--panel); }
  .d-art { position: relative; aspect-ratio: 1264 / 620; background: #20181E; }
  .d-art img { width: 100%; height: 100%; object-fit: cover; object-position: center 38%; }
  .d-art .fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 54px; }
  .d-art::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 35%, rgba(26,20,16,0.93) 100%); }
  .d-body { position: absolute; left: 12px; right: 12px; bottom: 9px; z-index: 2;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
  .d-name { font-family: var(--display); font-size: 18px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
  .d-meta { font-size: 12px; color: #CBBBA4; }
  .d-lock { position: absolute; inset: 0; z-index: 3;
    background: rgba(16,12,9,0.62); backdrop-filter: blur(1px);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: var(--display); font-size: 15px; color: #D8C9B2; }
  .run-banner { display: flex; align-items: center; gap: 12px; }
  .run-count { font-family: var(--mono); font-size: 18px; font-weight: 700; color: #FFC97F; }
  .raid-live { position: relative; width: 100%; aspect-ratio: 1264 / 620; max-height: 230px;
    overflow: hidden; background: #20181E; }
  .raid-live > img { width: 100%; height: 100%; object-fit: cover; object-position: center 38%;
    animation: kenburns 18s ease-in-out infinite alternate; }
  .raid-live .fallback { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 54px; }
  .raid-live::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,14,22,0.15) 0%, transparent 30%, rgba(26,20,16,0.92) 100%); }
  .raid-head { position: absolute; left: 12px; right: 12px; bottom: 8px; z-index: 3;
    display: flex; justify-content: space-between; align-items: flex-end; gap: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.85); }
  .pet-token { position: absolute; bottom: 24%; width: 56px; height: 56px; border-radius: 50%;
    overflow: hidden; border: 2px solid var(--ember); box-shadow: 0 0 14px rgba(232,133,61,0.7);
    z-index: 2; background: #1C1510; transition: left 1s linear; }
  .pet-token img { width: 100%; height: 100%; object-fit: cover; }
  .pet-token .fallback { display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; font-size: 28px; }
  .pet-token.march { animation: marchBob 1.1s ease-in-out infinite; }
  @keyframes marchBob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-7px) rotate(2deg); }
  }
  .pet-token.home { left: 50%; animation: homeBounce 0.9s ease-in-out infinite; }
  @keyframes homeBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-10px); }
  }
  .rlog { list-style: none; margin: 10px 0 0; padding: 0; }
  .rlog li { padding: 5px 0 5px 2px; font-size: 13px; color: #C7B8A1;
    border-bottom: 1px dashed #2A2018; }
  .rlog li:last-child { border-bottom: none; }
  .rlog li.new { animation: logIn 0.45s ease both; color: var(--ink); }
  @keyframes logIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
  /* ---------- battle arena ---------- */
  .battle { position: fixed; inset: 0; z-index: 49; display: flex; flex-direction: column;
    background: #14100C; animation: veilIn 250ms ease both; }
  .battle .bd { position: absolute; inset: 0; }
  .battle .bd img { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }
  .battle .bd::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,14,22,0.75), rgba(16,12,9,0.55) 40%, rgba(16,12,9,0.92)); }
  .b-top { position: relative; z-index: 2; padding: max(14px, env(safe-area-inset-top)) 16px 0; }
  .b-foe-name { display: flex; justify-content: space-between; align-items: baseline;
    font-family: var(--display); font-size: 18px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
  .hp { height: 14px; margin-top: 6px; border-radius: 999px; background: #14100C;
    border: 1px solid var(--edge); overflow: hidden; }
  .hp > i { display: block; height: 100%; transition: width 0.35s cubic-bezier(.22,1,.36,1);
    background: linear-gradient(90deg, #5FA052, #8FD06F); }
  .hp.mid > i { background: linear-gradient(90deg, #B8862E, #E0B45C); }
  .hp.low > i { background: linear-gradient(90deg, #8F2F26, #C75146); }
  .arena { position: relative; z-index: 2; flex: 1 1 auto; min-height: 240px; }
  .arena.shake { animation: arenaShake 0.3s ease; }
  @keyframes arenaShake {
    0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-7px, 3px); }
    50% { transform: translate(6px, -4px); } 75% { transform: translate(-4px, 2px); }
  }
  .b-foe { position: absolute; right: 7%; top: 16%; width: 46%; max-width: 250px;
    display: flex; align-items: center; justify-content: center;
    animation: menace 2.6s ease-in-out infinite; }
  @keyframes menace { 0%, 100% { transform: translateY(0) rotate(-1.5deg); } 50% { transform: translateY(-9px) rotate(1.5deg); } }
  .b-foe img { width: 100%; filter: drop-shadow(0 12px 22px rgba(0,0,0,0.6)); }

  .b-me { position: absolute; left: 7%; bottom: 14%; width: 96px; height: 96px;

  .b-me.lunge { animation: lunge 0.45s cubic-bezier(.3,1.2,.5,1); }

  .dmgnum { position: absolute; z-index: 4; font-family: var(--mono); font-weight: 800; font-size: 30px;

  .vspark { position: absolute; z-index: 4; font-size: 26px; pointer-events: none;

  .victory-wrap { position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column;

  .victory-text { font-family: var(--display); font-size: 44px; font-weight: 700; color: var(--gold);

  .b-controls { position: relative; z-index: 8; flex: 0 0 auto;

  button.btn.pulse { animation: btnPulse 1.4s ease-in-out infinite; }

    0%, 100% { box-shadow: 0 0 0 rgba(232,133,61,0); }

  /* ---------- island ---------- */
  .b-row { display: flex; align-items: center; gap: 12px; padding: 9px 0;
    border-bottom: 1px solid #2A2018; }
  .b-row:last-child { border-bottom: none; }

    border: 1px solid var(--edge); background: #1C1510;

  .b-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .b-main { flex: 1; min-width: 0; }
  .pips { display: flex; gap: 3px; margin-top: 4px; }
  .pip { width: 9px; height: 9px; border-radius: 3px; background: #3A2C1F; }
  .pip.on { background: var(--gold); box-shadow: 0 0 6px rgba(224,180,92,0.5); }

  /* ---------- bag ---------- */
  /* ---------- treasure satchel (kid-friendly) ---------- */
  .bag-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
  .bag-count { font-family: var(--display); font-size: 14px; color: var(--gold);
    background: rgba(224,180,92,0.12); border: 1px solid var(--ember-deep); border-radius: 999px; padding: 4px 12px; white-space: nowrap; }
  .bag-shelf { background: linear-gradient(180deg, #241B14, #1C1510); }
  .bag-empty { text-align: center; padding: 22px 10px; }
  .bag-empty-icon { font-size: 56px; animation: floaty 3s ease-in-out infinite; }
  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-8px) rotate(4deg); } }
  .bag-brag { text-align: center; font-family: var(--display); font-size: 15px; color: var(--gold);
    margin: 0 0 12px; animation: emberPulse 2s ease-in-out infinite; }
  .treasure-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 12px; }
  .treasure { -webkit-appearance: none; appearance: none; cursor: pointer; font: inherit; color: var(--ink);
    border: none; display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 8px 10px; border-radius: 18px; position: relative;
    background: rgba(20,16,12,0.55); border: 2px solid var(--edge); transition: transform 120ms ease; }
  .treasure:active { transform: scale(0.94); }
  .treasure.pop { animation: treasurePop 0.6s cubic-bezier(.2,1.5,.4,1); }
  @keyframes treasurePop { 0%,100% { transform: scale(1); } 40% { transform: scale(1.12) rotate(-3deg); } }
  .t-gem { position: relative; width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.18), rgba(0,0,0,0.25)); }
  .t-emoji { font-size: 42px; line-height: 1; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.45)); }
  .t-name { font-size: 12px; line-height: 1.2; text-align: center; font-weight: 600; }
  .t-qty { position: absolute; top: 6px; right: 8px; min-width: 22px; height: 22px; padding: 0 5px;
    border-radius: 999px; background: var(--ember); color: #1A1410; font-family: var(--mono);
    font-weight: 800; font-size: 12px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .t-spark { position: absolute; font-size: 15px; pointer-events: none; }
  .t-spark.s1 { top: 2px; left: 4px; animation: twinkle 1.8s ease-in-out infinite; }
  .t-spark.s2 { bottom: 4px; right: 2px; animation: twinkle 1.8s ease-in-out 0.4s infinite; }
  .t-spark.s3 { top: 10px; right: 8px; animation: twinkle 1.8s ease-in-out 0.8s infinite; }
  @keyframes twinkle { 0%,100% { opacity: 0.3; transform: scale(0.7); } 50% { opacity: 1; transform: scale(1.2); } }
  /* rarity glow rings */
  .treasure.r-common { border-color: #4A4036; }
  .treasure.r-uncommon { border-color: var(--r-uncommon); }
  .treasure.r-rare { border-color: var(--r-rare); box-shadow: 0 0 14px rgba(91,155,213,0.35); }
  .treasure.r-rare .t-gem { box-shadow: 0 0 18px rgba(91,155,213,0.5); }
  .treasure.r-epic { border-color: var(--r-epic); box-shadow: 0 0 16px rgba(168,107,209,0.45); }
  .treasure.r-epic .t-gem { box-shadow: 0 0 22px rgba(168,107,209,0.6); }
  .treasure.r-legendary { border-color: var(--r-legendary); box-shadow: 0 0 20px rgba(224,180,92,0.55); }
  .treasure.r-legendary .t-gem { box-shadow: 0 0 26px rgba(224,180,92,0.7); animation: gemGlow 2.4s ease-in-out infinite; }
  .treasure.r-mythic { border-color: var(--r-mythic); box-shadow: 0 0 24px rgba(232,93,117,0.6); }
  .treasure.r-mythic .t-gem { box-shadow: 0 0 30px rgba(232,93,117,0.75); animation: gemGlow 1.8s ease-in-out infinite; }
  .treasure.r-mythic .t-name, .treasure.r-legendary .t-name { color: var(--gold); }
  @keyframes gemGlow { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.35); } }
  .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 9px; }
  .inv-cell { background: rgba(20,16,12,0.6); border: 1px solid var(--edge); border-radius: 13px;
    padding: 10px 8px; text-align: center; }
  .inv-gem { font-size: 22px; line-height: 1; }
  .inv-name { font-size: 11.5px; margin-top: 5px; line-height: 1.25; }
  .inv-qty { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 3px; }
  .ach-row { padding: 8px 2px; }
  .ach-top { display: flex; justify-content: space-between; font-size: 13px; }
  .bar { height: 8px; background: #14100C; border: 1px solid var(--edge);
    border-radius: 999px; overflow: hidden; margin-top: 6px; }
  .bar > span { display: block; height: 100%;
    background: linear-gradient(90deg, var(--ember-deep), var(--ember)); }

  /* ---------- tab bar ---------- */
  .tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    display: flex; justify-content: space-around;
    max-width: 560px; margin: 0 auto;
    background: rgba(24,18,13,0.96);
    border-top: 1px solid var(--edge);
    padding: 7px 4px calc(7px + env(safe-area-inset-bottom));
    backdrop-filter: blur(8px);
  }
  .tab { flex: 1; min-height: 50px; border: none; background: none; color: var(--dim);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.04em; position: relative; }

    border-radius: 999px; background: var(--brick); color: #fff;

  /* ---------- splash & onboarding ---------- */
  .splash { position: fixed; inset: 0; z-index: 60; display: flex; flex-direction: column;

    box-shadow: 0 18px 60px rgba(0,0,0,0.6); }
  .splash .display { font-size: 30px; text-align: center; }
  .species-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin: 10px 0; }
  .sp-cell { border-radius: 15px; overflow: hidden; border: 2px solid var(--edge);
    background: #1C1510; padding: 0; position: relative; aspect-ratio: 1/1.06; }

  /* ---------- modals, celebration, toast ---------- */
  .veil { position: fixed; inset: 0; z-index: 40; background: rgba(12,9,6,0.72);
    display: flex; align-items: flex-end; justify-content: center;
    animation: veilIn 200ms ease both; }
  .veil.center { align-items: center; padding: 22px; }
  @keyframes veilIn { from { opacity: 0; } to { opacity: 1; } }
  .sheet { width: 100%; max-width: 560px; background: var(--panel);
    border: 1px solid var(--edge); border-radius: 22px 22px 0 0;
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 86dvh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    animation: sheetUp 260ms cubic-bezier(.22,1,.36,1) both; }
  @keyframes sheetUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal { width: 100%; max-width: 420px; background: var(--panel);
    border: 1px solid var(--edge); border-radius: 20px; padding: 18px;
    animation: sheetUp 240ms cubic-bezier(.22,1,.36,1) both; }
  .celebrate { position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 26px;
    background: radial-gradient(600px 600px at 50% 45%, rgba(232,133,61,0.18), rgba(12,9,6,0.85) 70%); }
  .cele-card { text-align: center; max-width: 360px; width: 100%;
    background: var(--panel); border: 1px solid #6B5326; border-radius: 22px;
    padding: 20px 18px; animation: pop 420ms cubic-bezier(.2,1.4,.4,1) both;
    box-shadow: 0 0 60px rgba(224,180,92,0.25); }
  @keyframes pop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .cele-card img.chest { width: 150px; margin: 0 auto 8px; filter: drop-shadow(0 10px 26px rgba(232,168,61,0.35)); border-radius: 16px; }
  .burst { font-size: 56px; animation: burst 900ms ease both; }
  @keyframes burst { 0% { transform: scale(0.3) rotate(-8deg); } 55% { transform: scale(1.25) rotate(3deg); } 100% { transform: scale(1); } }
  .drop-row { display: flex; justify-content: space-between; align-items: center;
    padding: 7px 4px; border-bottom: 1px solid #2A2018; font-size: 13.5px; }
  .drop-row:last-child { border-bottom: none; }
  .rar { font-size: 10.5px; letter-spacing: 0.1em; font-weight: 700; }
  .toast { position: fixed; left: 14px; right: 14px;
    bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 12px);
    z-index: 45; max-width: 532px; margin: 0 auto;
    padding: 12px 14px; border-radius: 14px; font-size: 13.5px; font-weight: 500;
    animation: sheetUp 240ms ease both; box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
  .toast.ok { background: #20301F; border: 1px solid #3E5C3A; color: #CFE8C4; }
  .toast.bad { background: #361D1A; border: 1px solid #5C3430; color: #F0C9C2; }

  /* ---------- parent ledger ---------- */
  .ledger-bg { position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(180deg, #20180F, #171108 70%); }
  .seal { display: inline-flex; align-items: center; gap: 6px;
    background: #2B1F12; border: 1px solid #6B5326; color: var(--gold);
    border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 700; }
  .seal.bad { background: #361D1A; border-color: #5C3430; color: #F0C9C2; }
  .p-tabs { display: flex; gap: 7px; margin: 4px 0 14px; }
  .p-tab { flex: 1; min-height: 42px; border-radius: 12px; border: 1px solid var(--edge);
    background: var(--panel); color: var(--dim); font-size: 13px; font-weight: 700; }
  .p-tab.on { color: var(--gold); border-color: #6B5326; background: #2B1F12; }
  .ledger-li { display: flex; align-items: center; gap: 10px; padding: 10px 2px;
    border-bottom: 1px solid #2A2018; font-size: 13px; }
  .ledger-li:last-child { border-bottom: none; }
  ul.ledger { list-style: none; margin: 0; padding: 0; }
  ul.ledger li { display: flex; justify-content: space-between; gap: 10px;
    padding: 8px 2px; border-bottom: 1px solid #2A2018; font-size: 12.5px; }
  ul.ledger li.fail { color: #F0C9C2; }
  ul.ledger .ms { color: var(--dim); font-family: var(--mono); font-size: 11px; flex: 0 0 auto; }
  ul.ledger .err { display: block; color: var(--brick); font-size: 11.5px; margin-top: 3px; }
  table.counts { width: 100%; border-collapse: collapse; font-size: 12.5px; font-family: var(--mono); }
  table.counts td { padding: 5px 4px; border-bottom: 1px solid #2A2018; }
  table.counts td:last-child { text-align: right; color: var(--gold); }

  /* ---------- v1.1 game feel ---------- */
  .flicker { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(540px 400px at 50% 58%, rgba(232,133,61,0.10), transparent 70%);
    animation: flicker 3.4s ease-in-out infinite; }
  @keyframes flicker { 0%, 100% { opacity: 0.4; } 40% { opacity: 1; } 60% { opacity: 0.62; } }
  .sparks { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .sparks span { position: absolute; bottom: -12px; border-radius: 50%;
    background: radial-gradient(circle, #FFE2B8, rgba(232,133,61,0) 72%);
    box-shadow: 0 0 9px 2px rgba(232,133,61,0.55);
    animation: rise linear infinite; opacity: 0; }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    8% { opacity: 0.85; }
    60% { opacity: 0.45; }
    100% { transform: translateY(-105vh) scale(0.4); opacity: 0; }
  }
  .pet-stage { position: absolute; inset: 0; animation: breathe 4.5s ease-in-out infinite; transform-origin: 50% 85%; }
  .pet-stage img { width: 100%; height: 100%; object-fit: cover;
    animation: kenburns 16s ease-in-out infinite alternate; }
  @keyframes kenburns { from { transform: scale(1.03) translate(0, 0); } to { transform: scale(1.11) translate(-2.5%, -2%); } }
  @keyframes breathe { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.045) translateY(-4px); } }
  .pet-stage.hop { animation: petHop 0.6s cubic-bezier(.34,1.56,.64,1); }
  .pet-stage.sway { animation: petSway 0.95s ease-in-out; }
  @keyframes petSway { 0%, 100% { transform: rotate(0); } 30% { transform: rotate(-2.2deg); } 70% { transform: rotate(2.2deg); } }
  .pet-stage.tilt { animation: petTilt 0.7s ease; }
  @keyframes petTilt { 0%, 100% { transform: rotate(0) scale(1); } 40% { transform: rotate(3deg) scale(1.03); } }
  .pet-stage.shine img { filter: brightness(1.28) saturate(1.18); }
  /* animated multi-frame guardian (when frame PNGs exist) */
  .anim-stack { position: relative; width: 100%; height: 100%; }
  .anim-stack .anim-frame { position: absolute; inset: 0; }
  .anim-frame { width: 100%; height: 100%; object-fit: contain; image-rendering: auto; will-change: opacity; }
  .pet-stage .anim-frame { object-fit: cover; }
  .duo-pet .anim-stack, .pet-token .anim-stack { width: 100%; height: 100%; }
  /* mood motions for the SINGLE-image fallback — every guardian moves, frames or not */
  .pet-stage.m-walk img { animation: kenburns 16s ease-in-out infinite alternate, walkWag 0.7s ease-in-out infinite; }
  .pet-stage.m-cheer { animation: cheerBounce 0.6s ease-in-out infinite; }
  .pet-stage.m-cheer img { animation: kenburns 16s ease-in-out infinite alternate, cheerWiggle 0.6s ease-in-out infinite; }
  .pet-stage.m-sleep { animation: sleepBreathe 5.5s ease-in-out infinite; }
  .pet-stage.m-sleep img { animation: none; filter: brightness(0.82) saturate(0.85); transform: rotate(-3deg); }
  .pet-stage.m-play img { animation: kenburns 16s ease-in-out infinite alternate, playSpin 1.1s ease-in-out infinite; }
  @keyframes walkWag { 0%, 100% { transform: rotate(-2.5deg); } 50% { transform: rotate(2.5deg); } }
  @keyframes cheerBounce { 0%, 100% { transform: translateY(0) scale(1); } 40% { transform: translateY(-12px) scale(1.05, 0.96); } }
  @keyframes cheerWiggle { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
  @keyframes sleepBreathe { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.02, 0.99) translateY(2px); } }
  @keyframes playSpin { 0%, 100% { transform: rotate(-8deg) scale(1); } 50% { transform: rotate(8deg) scale(1.04); } }
  .pet-stage.m-breathe .anim-frame, .duo-pet.m-breathe .anim-frame { animation: softBreathe 3.6s ease-in-out infinite; transform-origin: 50% 92%; }
  @keyframes softBreathe { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.035, 1.015) translateY(-1px); } }
  .emote { position: absolute; top: 20%; z-index: 3; font-size: 32px; pointer-events: none;
    animation: emoteUp 1.7s ease-out both; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  @keyframes emoteUp {
    0% { transform: translateY(8px) scale(0.6); opacity: 0; }
    15% { opacity: 1; transform: scale(1.05); }
    100% { transform: translateY(-72px) scale(1); opacity: 0; }
  }
  .av-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 2px; }
  .av-cell { width: 48px; height: 48px; border-radius: 14px; border: 2px solid var(--edge);
    background: #1C1510; font-size: 24px; display: flex; align-items: center; justify-content: center; }

    rollRarity: function (rand, weights) {
      const w = weights || CONFIG.RARITY_WEIGHTS;
      let total = 0;
      for (const r of ENUMS.RARITY) total += (w[r] || 0);
      let pick = rand() * total;
      for (const r of ENUMS.RARITY) {
        pick -= (w[r] || 0);
        if (pick < 0) return r;
      }
      return ENUMS.RARITY[0];
    },
    pickItemOfRarity: function (rand, rarity, itemPool) {
      const pool = itemPool.filter(function (i) { return i.rarity === rarity; });
      if (pool.length === 0) return null;
      return pool[Math.floor(rand() * pool.length)];
    },
    rollInt: function (rand, min, max) {

    // produces the same result, on any device, any number of times.
    resolveDungeon: function (run, def, itemPool) {
      const rand = RNG.mulberry32(run.seed);
      const gold = Loot.rollInt(rand, def.gold[0], def.gold[1]);
      const xp = Loot.rollInt(rand, def.xp[0], def.xp[1]);
      const byItem = {};
      for (let i = 0; i < def.lootRolls; i++) {
        const rarity = Loot.rollRarity(rand);
        let item = Loot.pickItemOfRarity(rand, rarity, itemPool);
        if (!item) {
          // No item of that rarity in the pool: walk down to the nearest one.
          const idx = ENUMS.RARITY.indexOf(rarity);
          for (let r = idx - 1; r >= 0 && !item; r--) {
            item = Loot.pickItemOfRarity(rand, ENUMS.RARITY[r], itemPool);

        if (diff === 0) {

        if (diff === 1) {
