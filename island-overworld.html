<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Guardian of the Hearth — Island</title>
<style>
  html, body { margin: 0; height: 100%; background: #1A1410; overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif; -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent; }
  #game { width: 100vw; height: 100dvh; }
  /* on-screen d-pad for touch */
  .pad { position: fixed; left: max(16px, env(safe-area-inset-left)); bottom: calc(20px + env(safe-area-inset-bottom));
    width: 168px; height: 168px; z-index: 10; touch-action: none; }
  .pad button { position: absolute; width: 56px; height: 56px; border: none; border-radius: 14px;
    background: rgba(36,27,20,0.86); color: #EDE3D2; font-size: 24px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); border: 1px solid rgba(232,133,61,0.4); }
  .pad button:active { background: rgba(232,133,61,0.55); }
  .pad .up { left: 56px; top: 0; }
  .pad .down { left: 56px; top: 112px; }
  .pad .left { left: 0; top: 56px; }
  .pad .right { left: 112px; top: 56px; }
  .hud { position: fixed; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(26,20,16,0.85); color: #EDE3D2; border: 1px solid rgba(232,133,61,0.4);
    border-radius: 999px; padding: 6px 16px; font-size: 14px; font-weight: 600; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .hint { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); right: max(16px, env(safe-area-inset-right));
    z-index: 10; color: rgba(237,227,210,0.55); font-size: 12px; max-width: 130px; text-align: right; line-height: 1.4; }
  .talk-btn { position: fixed; top: calc(60px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 15; background: #e8853d; color: #1a1410; border: none; font-weight: 800; font-size: 15px;
    padding: 10px 20px; border-radius: 999px; box-shadow: 0 3px 10px rgba(0,0,0,0.5); animation: talkPulse 1.4s ease-in-out infinite; }
  @keyframes talkPulse { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.06); } }
  .dialogue { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: 0 12px calc(16px + env(safe-area-inset-bottom)); }
  .dialogue-box { max-width: 560px; margin: 0 auto; background: rgba(20,16,12,0.97);
    border: 2px solid #e8853d; border-radius: 16px; padding: 16px 18px 14px; position: relative;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
  .dialogue-name { font-family: var(--display, system-ui); font-weight: 800; color: #ffd98a; font-size: 15px; margin-bottom: 6px; }
  .dialogue-text { color: #EDE3D2; font-size: 17px; line-height: 1.5; min-height: 52px; }
  .dialogue-more { position: absolute; right: 16px; bottom: 8px; color: rgba(232,133,61,0.8); font-size: 12px; animation: bobMore 1s ease-in-out infinite; }
  @keyframes bobMore { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }
</style>
</head>
<body>
<div id="game"></div>
<div class="hud" id="hud">Hearth Island</div>
<div style="position:fixed;top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));z-index:20;background:#e8853d;color:#1a1410;font-weight:800;font-size:13px;padding:4px 10px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.5);">v10 📜</div>
<div class="pad">
  <button class="up" data-dir="up" aria-label="Up">▲</button>
  <button class="down" data-dir="down" aria-label="Down">▼</button>
  <button class="left" data-dir="left" aria-label="Left">◀</button>
  <button class="right" data-dir="right" aria-label="Right">▶</button>
</div>
<div class="hint">Arrow keys or tap the pad. Walk into a building to enter.</div>
<button class="talk-btn" id="talkBtn" style="display:none;">💬 Talk (E)</button>
<div class="dialogue" id="dialogue" style="display:none;">
  <div class="dialogue-box">
    <div class="dialogue-name" id="dialogueName"></div>
    <div class="dialogue-text" id="dialogueText"></div>
    <div class="dialogue-more" id="dialogueMore">▼ tap / E</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<script>
/* =========================================================================
   GUARDIAN OF THE HEARTH — Pokémon-style step overworld (Phaser 3)
   - Grid is the source of truth. Pixel position is derived from grid.
   - Player state machine: IDLE (accepts input) / MOVING (locked).
   - One tile per input. Tween-based movement (NOT velocity). 180ms.
   - Six buildings are solid collision tiles.
   - Guardian wanders on a timer, one tile at a time, same collision rules.
   - Camera follows smoothly, grid-aligned.
   ========================================================================= */

// ---- TUNABLE CONFIG -------------------------------------------------------
const CONFIG = {
  TILE: 40,            // tile size in px
  COLS: 16,            // grid width in tiles
  ROWS: 16,            // grid height in tiles
  MOVE_MS: 180,        // player step tween duration (Pokémon feel ~150-250ms)
  GUARDIAN_MS: 950,    // guardian wanders a step roughly every ~1s (Pokémon NPC feel)
  GUARDIAN_MOVE_MS: 220,
  FOLLOW_LERP: 0.12,   // camera smoothing
  COLORS: {
    grassA: 0x4a8c52, grassB: 0x428049, grassC: 0x55995d, grassDark: 0x3a7044,
    path: 0xc2a86e, pathB: 0xb79a60, pathEdge: 0x9c7f54, pathSpeck: 0xa88f5a,
    water: 0x3a6ea5, waterB: 0x4279b0, waterHi: 0x5b97cf,
    building: 0x6b4a2e, buildingRoof: 0x8a3b2e, buildingDoor: 0x2a1c12,
    shrine: 0xe8853d, shadow: 0x000000,
  },
};

// The six buildings as solid tiles {col,row,label}. Everything else is walkable.
const BUILDINGS = [
  { col: 3,  row: 2,  w: 2, h: 2, label: 'Home',      color: 0x8a3b2e },
  { col: 11, row: 2,  w: 2, h: 2, label: 'Garden',    color: 0x4a7a3b },
  { col: 3,  row: 12, w: 2, h: 2, label: 'Workshop',  color: 0x7a5a2e },
  { col: 11, row: 12, w: 2, h: 2, label: 'Harbor',    color: 0x3a6ea5 },
  { col: 7,  row: 6,  w: 2, h: 2, label: 'Sanctuary', color: 0x6b4a8a },
  { col: 12, row: 9,  w: 2, h: 2, label: 'Ruins',     color: 0x5a5a5a },
];
// each building's door tile = the walkable tile just below its front-left cell.
// stepping onto a door tile enters that building.
BUILDINGS.forEach(function (b) { b.door = { c: b.col, r: b.row + b.h }; });
const DOOR_AT = {};
BUILDINGS.forEach(function (b) { DOOR_AT[b.door.c + ',' + b.door.r] = b; });

// ---- PROGRESSION CONFIG ---------------------------------------------------
// building states: 'locked' | 'unlocked' | 'active'. Start with 2 unlocked; others locked.
const START_UNLOCKED = ['Home', 'Sanctuary'];
// which interactions unlock which buildings (talk to dragon N times -> unlock more)
const UNLOCK_RULES = [
  { afterTalks: 1, unlock: 'Garden' },
  { afterTalks: 2, unlock: 'Workshop' },
  { afterTalks: 3, unlock: 'Harbor' },
  { afterTalks: 4, unlock: 'Ruins' },
];

// ---- DRAGON DIALOGUE ------------------------------------------------------
const DRAGON_LINES = [
  'The dragon watches you quietly\u2026',
  'It seems calm today.',
  'Something stirs deep in the island\u2026',
  'The dragon tilts its head, studying you.',
  'A warm ember-glow flickers in its eyes.',
  'It lets out a soft, rumbling purr.',
];
function buildingWelcome(label) {
  const map = {
    Home: 'The hearth burns warm here. This is home.',
    Garden: 'Glowing herbs and shy mushrooms grow in neat rows.',
    Workshop: 'Tools and half-built wonders rest on the benches.',
    Harbor: 'Little boats bob, waiting for far journeys.',
    Sanctuary: 'A peaceful nest among the branches. The guardian rests here.',
    Ruins: 'Old stones hum with forgotten rune-magic.',
  };
  return map[label] || ('Inside the ' + label + '.');
}

// ---- SAVE / LOAD (localStorage) -------------------------------------------
const SAVE_KEY = 'goth_island_save_v1';
const Save = {
  data: { px: 7, py: 10, talks: 0, unlocked: START_UNLOCKED.slice(), flags: {} },
  load: function () {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (d && typeof d.px === 'number') {
          Save.data = Object.assign(Save.data, d);
          if (!Array.isArray(Save.data.unlocked)) Save.data.unlocked = START_UNLOCKED.slice();
        }
      }
    } catch (e) {}
    return Save.data;
  },
  save: function () {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(Save.data)); } catch (e) {}
  },
  isUnlocked: function (label) { return Save.data.unlocked.indexOf(label) !== -1; },
  unlock: function (label) {
    if (Save.data.unlocked.indexOf(label) === -1) { Save.data.unlocked.push(label); Save.save(); return true; }
    return false;
  },
};

const DIRS = {
  up:    { dx: 0,  dy: -1 },
  down:  { dx: 0,  dy: 1 },
  left:  { dx: -1, dy: 0 },
  right: { dx: 1,  dy: 0 },
};

// ---- WORLD STATE ----------------------------------------------------------
const WORLD = {
  blocked: {},  // "col,row" -> building object
};
function key(c, r) { return c + ',' + r; }
BUILDINGS.forEach(function (b) {
  for (let dc = 0; dc < b.w; dc++) {
    for (let dr = 0; dr < b.h; dr++) {
      WORLD.blocked[key(b.col + dc, b.row + dr)] = b;
    }
  }
});

function isWalkable(c, r) {
  if (c < 0 || r < 0 || c >= CONFIG.COLS || r >= CONFIG.ROWS) return false;
  if (WORLD.blocked[key(c, r)]) return false;
  return true;
}

// ---- SCENE ----------------------------------------------------------------
class IslandScene extends Phaser.Scene {
  constructor() { super('island'); }

  preload() {
    // load the real dragon sprite; if it 404s we fall back to the emoji token (world never breaks)
    this.dragonLoaded = false;
    this.load.image('dragon', './guardian-dragon-cheer2.png');
    this.load.on('filecomplete-image-dragon', function () { this.dragonLoaded = true; }, this);
    this.load.on('loaderror', function () { this.dragonLoaded = false; }, this);
  }

  create() {
    const T = CONFIG.TILE;
    this.cameras.main.setBackgroundColor('#1a1410');
    this.cameras.main.setBounds(0, 0, CONFIG.COLS * T, CONFIG.ROWS * T);

    // --- draw the tile map: layered grass + dirt path (VISUAL ONLY, grid unchanged) ---
    const C = CONFIG.COLORS;
    const g = this.add.graphics();
    // deterministic per-tile noise so it never flickers between frames
    function tileRand(c, r) { let n = (c * 73856093) ^ (r * 19349663); n = (n << 13) ^ n; return ((n * (n * n * 15731 + 789221) + 1376312589) & 0x7fffffff) / 0x7fffffff; }
    for (let c = 0; c < CONFIG.COLS; c++) {
      for (let r = 0; r < CONFIG.ROWS; r++) {
        const onPath = (c === 7 || c === 8 || r === 7 || r === 8);
        const x = c * T, y = r * T, rnd = tileRand(c, r);
        if (onPath) {
          // dirt path with subtle tone variation + speckles
          g.fillStyle(rnd > 0.5 ? C.path : C.pathB, 1);
          g.fillRect(x, y, T, T);
          g.fillStyle(C.pathSpeck, 0.5);
          for (let s = 0; s < 3; s++) {
            const sx = x + 4 + tileRand(c + s * 7, r) * (T - 8);
            const sy = y + 4 + tileRand(c, r + s * 7) * (T - 8);
            g.fillRect(sx, sy, 3, 3);
          }
        } else {
          // grass: pick one of several greens by noise, then add lighter blades
          let base = C.grassA;
          if (rnd < 0.25) base = C.grassB; else if (rnd < 0.5) base = C.grassC; else if (rnd < 0.62) base = C.grassDark;
          g.fillStyle(base, 1);
          g.fillRect(x, y, T, T);
          // a few lighter grass blades for texture
          g.fillStyle(C.grassC, 0.4);
          for (let b = 0; b < 4; b++) {
            const bx = x + 5 + tileRand(c + b * 3, r * 2) * (T - 10);
            const by = y + 6 + tileRand(c * 2, r + b * 3) * (T - 12);
            g.fillRect(bx, by, 2, 5);
          }
        }
        // very subtle tile separation
        g.lineStyle(1, 0x000000, 0.05);
        g.strokeRect(x, y, T, T);
      }
    }

    // --- buildings: real structures with shadow, walls, and a ROOF layer above the player ---
    // (collision logic untouched; this is purely how they're drawn + depth-sorted)
    this.buildingLabels = [];
    // depth layers: ground=0, shadows=1, walls=2, entities=10, roofs=20 (above player), labels=22
    const wallG = this.add.graphics().setDepth(2);
    const shadowG = this.add.graphics().setDepth(1);
    const roofG = this.add.graphics().setDepth(20); // ABOVE entities → player walks "behind" roofs
    BUILDINGS.forEach(function (b) {
      const x = b.col * T, y = b.row * T, w = b.w * T, h = b.h * T;
      // soft drop shadow on the ground
      shadowG.fillStyle(C.shadow, 0.28);
      shadowG.fillEllipse(x + w / 2, y + h - 4, w * 0.92, h * 0.42);
      // wall body (lower 60%)
      const wallTop = y + h * 0.4;
      const wallShade = Phaser.Display.Color.IntegerToColor(b.color).darken(18).color;
      wallG.fillStyle(wallShade, 1);
      wallG.fillRect(x + 4, wallTop, w - 8, h - (wallTop - y) - 4);
      // wall highlight stripe
      wallG.fillStyle(Phaser.Display.Color.IntegerToColor(b.color).lighten(8).color, 1);
      wallG.fillRect(x + 4, wallTop, w - 8, 4);
      // door
      wallG.fillStyle(C.buildingDoor, 1);
      wallG.fillRect(x + w * 0.42, y + h - h * 0.32, w * 0.16, h * 0.28);
      wallG.fillStyle(0xE8C56A, 0.9); // doorknob
      wallG.fillCircle(x + w * 0.52, y + h - h * 0.18, 1.6);
      // windows
      wallG.fillStyle(0xFFE0A0, 0.85);
      wallG.fillRect(x + w * 0.18, wallTop + 8, w * 0.14, h * 0.14);
      wallG.fillRect(x + w * 0.68, wallTop + 8, w * 0.14, h * 0.14);
      // wall outline
      wallG.lineStyle(2, 0x000000, 0.3);
      wallG.strokeRect(x + 4, wallTop, w - 8, h - (wallTop - y) - 4);

      // ROOF (upper 50%, peaked) — drawn ABOVE the player so they pass behind it
      const roofColor = Phaser.Display.Color.IntegerToColor(b.color).lighten(6).color;
      roofG.fillStyle(roofColor, 1);
      roofG.beginPath();
      roofG.moveTo(x + 2, wallTop + 4);
      roofG.lineTo(x + w / 2, y - h * 0.12);
      roofG.lineTo(x + w - 2, wallTop + 4);
      roofG.closePath();
      roofG.fillPath();
      // roof shade underside
      roofG.fillStyle(0x000000, 0.18);
      roofG.fillRect(x + 2, wallTop, w - 4, 5);
      // roof ridge highlight
      roofG.lineStyle(2, Phaser.Display.Color.IntegerToColor(b.color).lighten(22).color, 0.8);
      roofG.beginPath();
      roofG.moveTo(x + w / 2, y - h * 0.12);
      roofG.lineTo(x + w / 2, wallTop + 4);
      roofG.strokePath();

      const lbl = this.add.text(x + w / 2, y - h * 0.16, b.label, {
        fontFamily: 'system-ui', fontSize: '12px', color: '#EDE3D2',
        stroke: '#000000', strokeThickness: 4,
      }).setOrigin(0.5, 1).setDepth(22);
      this.buildingLabels.push(lbl);
    }, this);

    // --- the Hearth: the glowing soul of the island ---
    const hx = 7.5 * T, hy = 7.5 * T;
    this.add.circle(hx, hy + 6, 16, 0x000000, 0.25).setDepth(1); // shadow
    this.add.circle(hx, hy, 13, 0x4a3526).setStrokeStyle(2, 0x2a1c12).setDepth(4); // stone ring
    this.shrineGlow = this.add.circle(hx, hy, 22, 0xe8853d, 0.35).setDepth(4);
    this.shrine = this.add.circle(hx, hy, 7, 0xFFD98A).setDepth(5);
    this.tweens.add({ targets: this.shrineGlow, scale: 1.4, alpha: 0.18, duration: 1100, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: this.shrine, scale: 1.25, duration: 700, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- PLAYER (grid is truth) ---
    this.player = {
      gridX: 7, gridY: 10, state: 'IDLE', facing: 'up',
    };
    const px = this.tileToPx(this.player.gridX), py = this.tileToPx(this.player.gridY);
    // soft shadow that lives just under the player (its own depth, follows in sync)
    this.playerShadow = this.add.ellipse(px, py + T * 0.28, T * 0.5, T * 0.22, 0x000000, 0.3).setDepth(9);
    // character body: a rounded token with a subtle gradient ring + the avatar
    this.playerSprite = this.add.container(px, py, [
      this.add.circle(0, 2, T * 0.31, 0x1e4a9e),                       // outer ring (darker)
      this.add.circle(0, 0, T * 0.27, 0x3a72d8).setStrokeStyle(2.5, 0xffffff), // body
      this.add.text(0, -1, '🧒', { fontSize: '22px' }).setOrigin(0.5),
    ]).setDepth(10);
    // directional notch shows which way the player faces
    this.facer = this.add.triangle(px, py, 0, -7, -6, 5, 6, 5, 0xffffff, 0.95).setDepth(11);
    // gentle idle breathing (visual only — never moves the grid position)
    this.tweens.add({ targets: this.playerSprite, scaleX: 1.05, scaleY: 0.95, duration: 1300,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- GUARDIAN (also grid-based, wanders on a timer) ---
    this.guardian = { gridX: 7, gridY: 11, state: 'IDLE' };
    const gx = this.tileToPx(this.guardian.gridX), gy = this.tileToPx(this.guardian.gridY);
    this.guardianShadow = this.add.ellipse(gx, gy + T * 0.26, T * 0.46, T * 0.2, 0x000000, 0.28).setDepth(8);
    this.guardianGlow = this.add.circle(gx, gy, T * 0.34, 0xe8853d, 0.3).setDepth(8);
    // dragon token: real sprite if it loaded, otherwise the styled emoji fallback
    let dragonVisual;
    if (this.dragonLoaded && this.textures.exists('dragon')) {
      dragonVisual = this.add.image(0, -2, 'dragon');
      const ds = (T * 1.5) / Math.max(dragonVisual.width, dragonVisual.height); // fit to ~1.5 tiles
      dragonVisual.setScale(ds);
    } else {
      dragonVisual = this.add.text(0, -1, '🐲', { fontSize: '20px' }).setOrigin(0.5);
    }
    this.guardianSprite = this.add.container(gx, gy, [dragonVisual]).setDepth(9);
    this.dragonVisual = dragonVisual;
    // idle LIFE (visual only — never affects the grid target the wander AI sets):
    // gentle breathing pulse on the dragon itself + a soft vertical float + glow pulse.
    this.tweens.add({ targets: this.dragonVisual, scaleX: this.dragonVisual.scaleX * 1.04,
      scaleY: this.dragonVisual.scaleY * 1.04, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: this.dragonVisual, y: this.dragonVisual.y - 2.5, duration: 1900,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: this.guardianGlow, alpha: 0.12, scale: 1.2, duration: 1400,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- camera follows player, smooth + grid stable ---
    this.cameras.main.startFollow(this.playerSprite, true, CONFIG.FOLLOW_LERP, CONFIG.FOLLOW_LERP);
    this.cameras.main.setZoom(this.computeZoom());
    this.scale.on('resize', function () { this.cameras.main.setZoom(this.computeZoom()); }, this);

    // --- INPUT: arrow keys -> discrete steps ---
    this.cursors = this.input.keyboard.createCursorKeys();
    this.heldDir = null;

    // touch d-pad
    const self = this;
    document.querySelectorAll('.pad button').forEach(function (btn) {
      const dir = btn.getAttribute('data-dir');
      btn.addEventListener('touchstart', function (e) { e.preventDefault(); self.heldDir = dir; }, { passive: false });
      btn.addEventListener('touchend', function (e) { e.preventDefault(); if (self.heldDir === dir) self.heldDir = null; }, { passive: false });
      btn.addEventListener('mousedown', function () { self.heldDir = dir; });
      btn.addEventListener('mouseup', function () { if (self.heldDir === dir) self.heldDir = null; });
    });

    // --- guardian wander timer (turn-based timing, independent of player) ---
    this.time.addEvent({
      delay: CONFIG.GUARDIAN_MS, loop: true,
      callback: this.guardianStep, callbackScope: this,
    });

    this.hud = document.getElementById('hud');
    if (this.hud) this.hud.textContent = 'Hearth Island';

    // ---- restore saved player position (grid truth) ----
    Save.load();
    if (isWalkable(Save.data.px, Save.data.py)) {
      this.player.gridX = Save.data.px; this.player.gridY = Save.data.py;
      this.playerSprite.x = this.tileToPx(Save.data.px);
      this.playerSprite.y = this.tileToPx(Save.data.py);
      this.syncFacer();
    }

    // ---- dialogue state ----
    this.dialogue = { active: false, full: '', shown: 0, timer: null, onClose: null };
    this.dlgEl = document.getElementById('dialogue');
    this.dlgName = document.getElementById('dialogueName');
    this.dlgText = document.getElementById('dialogueText');
    this.talkBtn = document.getElementById('talkBtn');

    // talk key + button (reuse self from above)
    this.input.keyboard.on('keydown-E', function () { self.onTalkKey(); });
    if (this.talkBtn) {
      this.talkBtn.addEventListener('touchstart', function (e) { e.preventDefault(); self.onTalkKey(); }, { passive: false });
      this.talkBtn.addEventListener('click', function () { self.onTalkKey(); });
    }
    // tapping the dialogue advances/closes it
    if (this.dlgEl) {
      this.dlgEl.addEventListener('touchstart', function (e) { e.preventDefault(); self.advanceDialogue(); }, { passive: false });
      this.dlgEl.addEventListener('click', function () { self.advanceDialogue(); });
    }
    this.input.keyboard.on('keydown-SPACE', function () { if (self.dialogue.active) self.advanceDialogue(); });

    // apply building locked/unlocked visuals
    this.applyBuildingStates();
  }

  // ---- DIALOGUE SYSTEM (typewriter) ----
  startDialogue(name, text, onClose) {
    this.dialogue.active = true;
    this.dialogue.full = text;
    this.dialogue.shown = 0;
    this.dialogue.onClose = onClose || null;
    if (this.dlgName) this.dlgName.textContent = name;
    if (this.dlgText) this.dlgText.textContent = '';
    if (this.dlgEl) this.dlgEl.style.display = 'block';
    if (this.talkBtn) this.talkBtn.style.display = 'none';
    this.player.state = 'MOVING'; // lock movement during dialogue
    const self = this;
    if (this.dialogue.timer) clearInterval(this.dialogue.timer);
    this.dialogue.timer = setInterval(function () {
      self.dialogue.shown++;
      if (self.dlgText) self.dlgText.textContent = self.dialogue.full.slice(0, self.dialogue.shown);
      if (self.dialogue.shown >= self.dialogue.full.length) { clearInterval(self.dialogue.timer); self.dialogue.timer = null; }
    }, 28);
  }
  advanceDialogue() {
    if (!this.dialogue.active) return;
    // if still typing, reveal all; else close
    if (this.dialogue.timer) {
      clearInterval(this.dialogue.timer); this.dialogue.timer = null;
      this.dialogue.shown = this.dialogue.full.length;
      if (this.dlgText) this.dlgText.textContent = this.dialogue.full;
      return;
    }
    this.closeDialogue();
  }
  closeDialogue() {
    this.dialogue.active = false;
    if (this.dlgEl) this.dlgEl.style.display = 'none';
    this.player.state = 'IDLE'; // resume control
    const cb = this.dialogue.onClose; this.dialogue.onClose = null;
    if (cb) cb();
  }

  // ---- TALK: pressing E near the dragon ----
  onTalkKey() {
    if (this.dialogue.active) { this.advanceDialogue(); return; }
    if (this.player.state !== 'IDLE') return;
    const near = (Math.abs(this.player.gridX - this.guardian.gridX) + Math.abs(this.player.gridY - this.guardian.gridY)) <= 2;
    if (!near) return;
    // pick a dialogue line (rotate through), then handle unlock progression
    const line = DRAGON_LINES[Save.data.talks % DRAGON_LINES.length];
    Save.data.talks += 1; Save.save();
    const self = this;
    this.startDialogue('🐉 Dragon', line, function () { self.checkUnlocks(); });
  }

  // ---- PROGRESSION: unlock buildings after enough talks ----
  checkUnlocks() {
    const self = this;
    for (let i = 0; i < UNLOCK_RULES.length; i++) {
      const rule = UNLOCK_RULES[i];
      if (Save.data.talks >= rule.afterTalks && !Save.isUnlocked(rule.unlock)) {
        Save.unlock(rule.unlock);
        self.applyBuildingStates();
        self.startDialogue('\u2728 The island stirs', 'The ' + rule.unlock + ' has awakened! You can enter it now.', null);
        return; // one unlock per talk
      }
    }
  }

  // ---- building locked/unlocked visuals (locked = dimmed + 🔒) ----
  applyBuildingStates() {
    if (!this._lockIcons) this._lockIcons = {};
    const T = CONFIG.TILE;
    const self = this;
    BUILDINGS.forEach(function (b) {
      const unlocked = Save.isUnlocked(b.label);
      // lock icon over locked buildings
      if (!unlocked && !self._lockIcons[b.label]) {
        const cx = b.col * T + (b.w * T) / 2, cy = b.row * T + (b.h * T) / 2;
        self._lockIcons[b.label] = self.add.text(cx, cy, '🔒', { fontSize: '22px' }).setOrigin(0.5).setDepth(21);
      } else if (unlocked && self._lockIcons[b.label]) {
        self._lockIcons[b.label].destroy(); self._lockIcons[b.label] = null;
      }
    });
  }

  computeZoom() {
    // fit the grid comfortably; zoom so ~9 tiles tall are visible
    const visibleTiles = 9;
    const z = (this.scale.height) / (visibleTiles * CONFIG.TILE);
    return Math.max(1, Math.min(2.4, z));
  }

  tileToPx(t) { return t * CONFIG.TILE + CONFIG.TILE / 2; }

  // ---- PLAYER STEP: validate -> lock -> tween -> unlock ----
  tryMove(dir) {
    if (this.player.state !== 'IDLE') return;          // input locked during movement
    const d = DIRS[dir];
    this.player.facing = dir;
    this.updateFacer();
    const tc = this.player.gridX + d.dx, tr = this.player.gridY + d.dy;
    // blocked by terrain/buildings OR by the guardian standing there
    const guardianThere = (tc === this.guardian.gridX && tr === this.guardian.gridY);
    if (!isWalkable(tc, tr) || guardianThere) {
      const b = WORLD.blocked[key(tc, tr)];
      if (b && this.hud) { this.hud.textContent = '🚪 ' + b.label; }
      this.bump(dir);
      return;
    }
    this.player.state = 'MOVING';
    this.player.gridX = tc; this.player.gridY = tr;     // grid updates AFTER validation
    if (this.hud) this.hud.textContent = 'Hearth Island';
    const nx = this.tileToPx(tc), ny = this.tileToPx(tr);
    const self = this;
    this.tweens.add({
      targets: [this.playerSprite, this.facer], x: nx, y: ny,
      duration: CONFIG.MOVE_MS, ease: 'Linear',
      onUpdate: function () { self.syncFacer(); },
      onComplete: function () {
        // hard snap to the grid so sprite can never drift from grid truth
        self.playerSprite.x = self.tileToPx(self.player.gridX);
        self.playerSprite.y = self.tileToPx(self.player.gridY);
        self.player.state = 'IDLE';
        self.syncFacer();
        // building entry: did we land on a door tile?
        // save position after every completed step
        Save.data.px = self.player.gridX; Save.data.py = self.player.gridY; Save.save();
        // building entry: did we land on a door tile?
        const b = DOOR_AT[self.player.gridX + ',' + self.player.gridY];
        if (b) {
          if (Save.isUnlocked(b.label)) self.enterBuilding(b);
          else self.startDialogue('\uD83D\uDD12 ' + b.label, 'This place is still sleeping. Talk to the dragon to awaken the island.', null);
        }
      },
    });
  }

  // FADE OUT -> launch interior scene -> (interior fades in). Movement state preserved on return.
  enterBuilding(b) {
    if (this._entering) return;
    this._entering = true;
    this.player.state = 'MOVING'; // lock input during transition
    const cam = this.cameras.main;
    cam.fadeOut(280, 16, 12, 9);
    const self = this;
    cam.once('camerafadeoutcomplete', function () {
      // remember where to put the player when they come back (on the door tile)
      self.scene.launch('interior', { building: b, returnTo: { c: self.player.gridX, r: self.player.gridY } });
      self.scene.pause();
    });
  }

  // called by the interior scene when the player exits
  resumeFromInterior(returnTo) {
    this._entering = false;
    this.player.gridX = returnTo.c; this.player.gridY = returnTo.r;
    this.playerSprite.x = this.tileToPx(returnTo.c);
    this.playerSprite.y = this.tileToPx(returnTo.r);
    this.syncFacer();
    this.player.state = 'IDLE';
    this.cameras.main.fadeIn(280, 16, 12, 9);
  }

  bump(dir) {
    // guard: only one bump at a time, and lock input during it so bumps can't stack/drift
    if (this.player.state !== 'IDLE') return;
    const d = DIRS[dir];
    const self = this;
    // origin is ALWAYS the true grid pixel, never the live sprite position
    const baseX = this.tileToPx(this.player.gridX);
    const baseY = this.tileToPx(this.player.gridY);
    this.playerSprite.x = baseX; this.playerSprite.y = baseY; // start from truth
    this.player.state = 'MOVING'; // lock so no new input/bump until this finishes
    this.tweens.add({
      targets: this.playerSprite,
      x: baseX + d.dx * 7, y: baseY + d.dy * 7, duration: 90, yoyo: true, ease: 'Quad.easeOut',
      onUpdate: function () { self.syncFacer(); },
      onComplete: function () {
        // hard snap back to the exact grid pixel — sprite can NEVER drift into a building
        self.playerSprite.x = baseX; self.playerSprite.y = baseY;
        self.player.state = 'IDLE';
        self.syncFacer();
      },
    });
  }

  updateFacer() {
    // place the facing notch on the correct side of the player
    const d = DIRS[this.player.facing];
    this.facer.setRotation({ up: 0, right: Math.PI / 2, down: Math.PI, left: -Math.PI / 2 }[this.player.facing]);
    this.facerOffset = { x: d.dx * CONFIG.TILE * 0.42, y: d.dy * CONFIG.TILE * 0.42 };
    this.syncFacer();
  }
  syncFacer() {
    if (!this.facerOffset) this.facerOffset = { x: 0, y: -CONFIG.TILE * 0.42 };
    this.facer.x = this.playerSprite.x + this.facerOffset.x;
    this.facer.y = this.playerSprite.y + this.facerOffset.y;
  }

  // ---- GUARDIAN STEP: random direction, validate, tween one tile ----
  guardianStep() {
    if (this.guardian.state !== 'IDLE') return;
    // REACTIVE LAYER (visual only): if the player is near, the dragon tends to pause and notice.
    // This biases the pause chance but does NOT alter the movement algorithm itself.
    const near = (Math.abs(this.player.gridX - this.guardian.gridX) + Math.abs(this.player.gridY - this.guardian.gridY)) <= 2;
    if (near) { this.reactToPlayer(true); if (Math.random() < 0.7) return; }
    else { this.reactToPlayer(false); }
    // architect spec: random directional AI, one tile, collision-aware, tween-based.
    // ~70% of the time it actually moves; otherwise it pauses a beat (feels natural).
    if (Math.random() < 0.3) return;
    const order = Phaser.Utils.Array.Shuffle(['up', 'down', 'left', 'right']);
    for (let i = 0; i < order.length; i++) {
      const d = DIRS[order[i]];
      const tc = this.guardian.gridX + d.dx, tr = this.guardian.gridY + d.dy;
      // walkable, not the player's tile, and stay near the island center (don't drift to edges forever)
      if (isWalkable(tc, tr) && !(tc === this.player.gridX && tr === this.player.gridY)) {
        return this.guardianMoveTo(tc, tr);
      }
    }
  }

  // VISUAL reaction to player proximity — glow brightens, dragon does a little perk-up.
  // Touches nothing in the grid/AI; purely cosmetic feedback.
  reactToPlayer(isNear) {
    if (isNear === this._wasNear) return; // only react on change
    this._wasNear = isNear;
    if (!this.dragonVisual) return;
    if (isNear) {
      if (this.guardianGlow) this.guardianGlow.setFillStyle(0xffd066, 0.5);
      // a quick perk-up hop (visual only)
      this.tweens.add({ targets: this.dragonVisual, y: this.dragonVisual.y - 5, duration: 160,
        yoyo: true, ease: 'Quad.easeOut' });
      if (this.hud) this.hud.textContent = '🐉 the dragon noticed you!';
    } else {
      if (this.guardianGlow) this.guardianGlow.setFillStyle(0xe8853d, 0.3);
      if (this.hud) this.hud.textContent = 'Hearth Island';
    }
  }

  guardianMoveTo(tc, tr) {
    this.guardian.state = 'MOVING';
    this.guardian.gridX = tc; this.guardian.gridY = tr;
    const nx = this.tileToPx(tc), ny = this.tileToPx(tr);
    const self = this;
    this.tweens.add({
      targets: this.guardianSprite, x: nx, y: ny,
      duration: CONFIG.GUARDIAN_MOVE_MS, ease: 'Sine.easeInOut',
      onComplete: function () {
        self.guardianSprite.x = self.tileToPx(self.guardian.gridX);
        self.guardianSprite.y = self.tileToPx(self.guardian.gridY);
        self.guardian.state = 'IDLE';
      },
    });
  }

  update() {
    // show the Talk button when near the dragon and free to talk (UI only)
    if (this.talkBtn) {
      const near = (Math.abs(this.player.gridX - this.guardian.gridX) + Math.abs(this.player.gridY - this.guardian.gridY)) <= 2;
      const show = near && this.player.state === 'IDLE' && !this.dialogue.active && !this._entering;
      this.talkBtn.style.display = show ? 'block' : 'none';
    }
    // visual sync: keep shadows + glows under their entities (does NOT touch grid/movement)
    if (this.playerShadow) { this.playerShadow.x = this.playerSprite.x; this.playerShadow.y = this.playerSprite.y + CONFIG.TILE * 0.28; }
    if (this.guardianShadow) { this.guardianShadow.x = this.guardianSprite.x; this.guardianShadow.y = this.guardianSprite.y + CONFIG.TILE * 0.26; }
    if (this.guardianGlow) { this.guardianGlow.x = this.guardianSprite.x; this.guardianGlow.y = this.guardianSprite.y; }

    // SAFETY: the player must NEVER occupy a blocked tile. If they do, snap to a safe tile.
    if (!isWalkable(this.player.gridX, this.player.gridY)) {
      console.warn('[BUG] player on blocked tile', this.player.gridX, this.player.gridY,
        '-> snapping to safe tile');
      // find nearest safe tile (spiral out)
      let safe = null;
      for (let r = 1; r < 8 && !safe; r++) {
        for (let dy = -r; dy <= r && !safe; dy++) {
          for (let dx = -r; dx <= r && !safe; dx++) {
            const c = this.player.gridX + dx, rr = this.player.gridY + dy;
            if (isWalkable(c, rr)) safe = { c: c, r: rr };
          }
        }
      }
      if (safe) {
        this.player.gridX = safe.c; this.player.gridY = safe.r;
        this.playerSprite.x = this.tileToPx(safe.c);
        this.playerSprite.y = this.tileToPx(safe.r);
      }
    }
    // convert held direction (key or pad) into ONE discrete step when IDLE
    let dir = this.heldDir;
    if (this.cursors.up.isDown) dir = 'up';
    else if (this.cursors.down.isDown) dir = 'down';
    else if (this.cursors.left.isDown) dir = 'left';
    else if (this.cursors.right.isDown) dir = 'right';
    if (dir && this.player.state === 'IDLE') this.tryMove(dir);
  }
}

// ---- INTERIOR SCENE (simple single room; entered via building doors) -------
class InteriorScene extends Phaser.Scene {
  constructor() { super('interior'); }

  init(data) { this.building = data.building; this.returnTo = data.returnTo; }

  create() {
    const T = CONFIG.TILE;
    const W = this.scale.width, H = this.scale.height;
    const b = this.building;
    this.cameras.main.setBackgroundColor('#1a1410');

    // room dimensions (a cozy interior, centered)
    const roomW = Math.min(W * 0.82, 360), roomH = Math.min(H * 0.6, 360);
    const rx = (W - roomW) / 2, ry = (H - roomH) / 2;

    const g = this.add.graphics();
    // floor (wood plank look via stripes, tinted by building color)
    const floorBase = Phaser.Display.Color.IntegerToColor(b.color).darken(40).color;
    g.fillStyle(floorBase, 1);
    g.fillRect(rx, ry, roomW, roomH);
    g.fillStyle(0x000000, 0.12);
    for (let y = ry; y < ry + roomH; y += 22) { g.fillRect(rx, y, roomW, 2); }
    // back wall (upper third, lighter)
    const wallCol = Phaser.Display.Color.IntegerToColor(b.color).darken(20).color;
    g.fillStyle(wallCol, 1);
    g.fillRect(rx, ry, roomW, roomH * 0.3);
    // wall trim
    g.fillStyle(Phaser.Display.Color.IntegerToColor(b.color).lighten(10).color, 1);
    g.fillRect(rx, ry + roomH * 0.3 - 4, roomW, 4);
    // room border
    g.lineStyle(3, 0x000000, 0.4);
    g.strokeRect(rx, ry, roomW, roomH);
    // a rug
    g.fillStyle(Phaser.Display.Color.IntegerToColor(b.color).lighten(14).color, 0.5);
    g.fillEllipse(W / 2, ry + roomH * 0.62, roomW * 0.5, roomH * 0.3);
    // a door at the bottom (exit marker)
    g.fillStyle(0x2a1c12, 1);
    g.fillRect(W / 2 - 16, ry + roomH - 30, 32, 30);
    g.fillStyle(0xE8C56A, 0.9);
    g.fillCircle(W / 2 + 8, ry + roomH - 15, 2);

    // title
    this.add.text(W / 2, ry - 18, b.label, { fontFamily: 'system-ui', fontSize: '20px',
      color: '#EDE3D2', stroke: '#000000', strokeThickness: 4, fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(W / 2, ry + 18, 'Inside the ' + b.label, { fontFamily: 'system-ui', fontSize: '13px',
      color: '#C9BCA6' }).setOrigin(0.5);

    // player avatar inside (near the door, facing up into the room)
    const pSh = this.add.ellipse(W / 2, ry + roomH - 44 + T * 0.28, T * 0.5, T * 0.22, 0x000000, 0.3);
    this.add.container(W / 2, ry + roomH - 44, [
      this.add.circle(0, 2, T * 0.31, 0x1e4a9e),
      this.add.circle(0, 0, T * 0.27, 0x3a72d8).setStrokeStyle(2.5, 0xffffff),
      this.add.text(0, -1, '🧒', { fontSize: '22px' }).setOrigin(0.5),
    ]);

    // exit prompt
    this.add.text(W / 2, ry + roomH + 24, 'Press E or ESC to leave  ·  or tap here',
      { fontFamily: 'system-ui', fontSize: '13px', color: '#E8853D' }).setOrigin(0.5)
      .setInteractive({ useHandCursor: true })
      .on('pointerdown', function () { this.exit(); }, this);

    // keys
    this.input.keyboard.on('keydown-E', function () { this.exit(); }, this);
    this.input.keyboard.on('keydown-ESC', function () { this.exit(); }, this);
    // tap anywhere on the door also exits
    this.input.on('pointerdown', function (p) {
      if (p.y > ry + roomH - 40 && Math.abs(p.x - W / 2) < 40) this.exit();
    }, this);

    this.cameras.main.fadeIn(280, 16, 12, 9);
    this._exiting = false;
    // update HUD
    const hud = document.getElementById('hud'); if (hud) hud.textContent = '🚪 ' + b.label;
  }

  exit() {
    if (this._exiting) return;
    this._exiting = true;
    const self = this;
    this.cameras.main.fadeOut(280, 16, 12, 9);
    this.cameras.main.once('camerafadeoutcomplete', function () {
      const island = self.scene.get('island');
      self.scene.resume('island');
      if (island && island.resumeFromInterior) island.resumeFromInterior(self.returnTo);
      const hud = document.getElementById('hud'); if (hud) hud.textContent = 'Hearth Island';
      self.scene.stop();
    });
  }
}

// ---- BOOT -----------------------------------------------------------------
const game = new Phaser.Game({
  type: Phaser.AUTO,
  parent: 'game',
  backgroundColor: '#1a1410',
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH,
    width: window.innerWidth, height: window.innerHeight },
  pixelArt: false,
  scene: [IslandScene, InteriorScene],
});

// ---- lightweight self-test (logged to console; proves grid logic) ---------
(function selfTest() {
  const results = [];
  function ok(name, cond) { results.push((cond ? 'PASS ' : 'FAIL ') + name); }
  ok('building footprint blocked', WORLD.blocked['3,2'] && WORLD.blocked['4,3'] && WORLD.blocked['3,3'] && WORLD.blocked['4,2']);
  ok('open tile is walkable', isWalkable(7, 10) === true);
  ok('building not walkable', isWalkable(3, 2) === false && isWalkable(4, 3) === false);
  ok('out of bounds not walkable', isWalkable(-1, 5) === false && isWalkable(99, 5) === false);
  ok('six 2x2 = 24 blocked tiles', Object.keys(WORLD.blocked).length === 24);
  console.log('[Island self-test]\n' + results.join('\n'));
})();
