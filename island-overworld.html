<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Guardian of the Hearth — Island</title>
<style>
  html, body { margin: 0; height: 100%; background: #1A1410; overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif; -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent; }
  #game { width: 100vw; height: 100dvh; }
  /* on-screen d-pad for touch */
  .pad { position: fixed; left: max(16px, env(safe-area-inset-left)); bottom: calc(20px + env(safe-area-inset-bottom));
    width: 168px; height: 168px; z-index: 10; touch-action: none; }
  .pad button { position: absolute; width: 56px; height: 56px; border: none; border-radius: 14px;
    background: rgba(36,27,20,0.86); color: #EDE3D2; font-size: 24px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); border: 1px solid rgba(232,133,61,0.4); }
  .pad button:active { background: rgba(232,133,61,0.55); }
  .pad .up { left: 56px; top: 0; }
  .pad .down { left: 56px; top: 112px; }
  .pad .left { left: 0; top: 56px; }
  .pad .right { left: 112px; top: 56px; }
  .hud { position: fixed; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(26,20,16,0.85); color: #EDE3D2; border: 1px solid rgba(232,133,61,0.4);
    border-radius: 999px; padding: 6px 16px; font-size: 14px; font-weight: 600; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .hint { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); right: max(16px, env(safe-area-inset-right));
    z-index: 10; color: rgba(237,227,210,0.55); font-size: 12px; max-width: 130px; text-align: right; line-height: 1.4; }
  .talk-btn { position: fixed; top: calc(60px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 15; background: #e8853d; color: #1a1410; border: none; font-weight: 800; font-size: 15px;
    padding: 10px 20px; border-radius: 999px; box-shadow: 0 3px 10px rgba(0,0,0,0.5); animation: talkPulse 1.4s ease-in-out infinite; }
  @keyframes talkPulse { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.06); } }
  .dialogue { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: 0 12px calc(16px + env(safe-area-inset-bottom)); }
  .dialogue-box { max-width: 560px; margin: 0 auto; background: rgba(20,16,12,0.97);
    border: 2px solid #e8853d; border-radius: 16px; padding: 16px 18px 14px; position: relative;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
  .dialogue-name { font-family: var(--display, system-ui); font-weight: 800; color: #ffd98a; font-size: 15px; margin-bottom: 6px; }
  .dialogue-text { color: #EDE3D2; font-size: 17px; line-height: 1.5; min-height: 52px; }
  .dialogue-more { position: absolute; right: 16px; bottom: 8px; color: rgba(232,133,61,0.8); font-size: 12px; animation: bobMore 1s ease-in-out infinite; }
  @keyframes bobMore { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

  /* ===== HERO SELECT + CREATOR ===== */
  .hero-overlay { position: fixed; inset: 0; z-index: 100; overflow-y: auto;
    background: radial-gradient(circle at 50% 30%, #3a2418, #1a1410 70%);
    display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }
  .hero-panel { width: 100%; max-width: 520px; }
  .hero-crest { font-size: 56px; text-align: center; filter: drop-shadow(0 0 18px rgba(232,133,61,0.7)); animation: crestPulse 2.4s ease-in-out infinite; }
  @keyframes crestPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  .hero-h1 { font-family: 'Georgia', serif; font-size: 26px; color: #ffd98a; text-align: center; margin: 8px 0 4px;
    text-shadow: 0 2px 12px rgba(232,133,61,0.5); }
  .hero-sub { color: #c9bca6; text-align: center; font-size: 14px; margin: 0 0 20px; }
  .hero-slots { display: flex; flex-direction: column; gap: 12px; }
  .hero-slot { display: flex; align-items: center; gap: 14px; background: rgba(40,30,22,0.9);
    border: 2px solid rgba(232,133,61,0.35); border-radius: 16px; padding: 14px 16px; cursor: pointer;
    transition: transform 120ms ease, border-color 120ms ease; }
  .hero-slot:active { transform: scale(0.98); }
  .hero-slot.filled:hover { border-color: rgba(232,133,61,0.8); }
  .hero-slot.empty { border-style: dashed; justify-content: center; color: #e8853d; font-weight: 700; }
  .hero-slot-portrait { width: 56px; height: 56px; border-radius: 50%; background: #2a1c12; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; border: 2px solid rgba(232,133,61,0.4); overflow: hidden; }
  .hero-slot-info { flex: 1; min-width: 0; }
  .hero-slot-name { font-family: 'Georgia', serif; font-weight: 700; color: #ede3d2; font-size: 18px; }
  .hero-slot-title { color: #c9bca6; font-size: 13px; }
  .hero-slot-guardian { font-size: 22px; flex: 0 0 auto; }
  .hero-slot-del { background: rgba(0,0,0,0.3); border: none; color: #b88; width: 28px; height: 28px; border-radius: 8px; font-size: 14px; flex: 0 0 auto; }
  /* creator */
  .creator-row { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 14px; }
  .creator-preview { width: 130px; height: 150px; flex: 0 0 auto; background: rgba(20,16,12,0.6);
    border: 2px solid rgba(232,133,61,0.35); border-radius: 14px; }
  .creator-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .creator-ctl { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    background: rgba(40,30,22,0.8); border-radius: 10px; padding: 6px 8px; }
  .creator-ctl-label { color: #c9bca6; font-size: 12px; flex: 0 0 auto; width: 52px; }
  .creator-ctl-val { color: #ede3d2; font-size: 13px; flex: 1; text-align: center; text-transform: capitalize; }
  .creator-arrow { background: rgba(232,133,61,0.25); border: none; color: #ffd98a; width: 30px; height: 30px;
    border-radius: 8px; font-size: 16px; font-weight: 800; flex: 0 0 auto; }
  .creator-arrow:active { background: rgba(232,133,61,0.5); }
  .creator-name-row { margin-bottom: 14px; }
  .hero-input { width: 100%; box-sizing: border-box; background: rgba(20,16,12,0.8); border: 2px solid rgba(232,133,61,0.4);
    border-radius: 12px; padding: 12px 14px; color: #ede3d2; font-size: 17px; text-align: center; font-family: 'Georgia', serif; }
  .creator-label { color: #c9bca6; font-size: 13px; margin-bottom: 8px; text-align: center; }
  .guardian-pick { display: flex; gap: 8px; justify-content: center; }
  .guardian-opt { width: 60px; height: 60px; border-radius: 14px; background: rgba(40,30,22,0.8);
    border: 2px solid transparent; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .guardian-opt.sel { border-color: #e8853d; background: rgba(232,133,61,0.25); }
  .guardian-blurb { color: #c9bca6; font-size: 13px; text-align: center; margin-top: 10px; min-height: 34px; }
  .creator-guardian { margin-bottom: 18px; }
  .creator-buttons { display: flex; gap: 12px; }
  .hero-btn { flex: 1; border: none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; }
  .hero-btn.primary { background: #e8853d; color: #1a1410; }
  .hero-btn.ghost { background: rgba(60,45,33,0.8); color: #ede3d2; }
</style>
</head>
<body>
<div id="game"></div>

<!-- ===== HERO SELECT + CREATOR OVERLAY (shown before the island) ===== -->
<div id="heroOverlay" class="hero-overlay">
  <div class="hero-panel">
    <!-- SELECT SCREEN -->
    <div id="heroSelect">

</div>
<div class="hud" id="hud">Hearth Island</div>
<button id="soundBtn" style="position:fixed;top:calc(12px + env(safe-area-inset-top));left:calc(12px + env(safe-area-inset-left));z-index:20;background:rgba(36,27,20,0.86);color:#EDE3D2;border:1px solid rgba(232,133,61,0.4);border-radius:10px;width:40px;height:40px;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.5);">🔊</button>
<div style="position:fixed;top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));z-index:20;background:#e8853d;color:#1a1410;font-weight:800;font-size:13px;padding:4px 10px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.5);">v13 👧</div>
<div class="pad">
  <button class="up" data-dir="up" aria-label="Up">▲</button>
  <button class="down" data-dir="down" aria-label="Down">▼</button>
  <button class="left" data-dir="left" aria-label="Left">◀</button>
  <button class="right" data-dir="right" aria-label="Right">▶</button>
</div>
<div class="hint">Arrow keys or tap the pad. Walk into a building to enter.</div>
<button class="talk-btn" id="talkBtn" style="display:none;">💬 Talk (E)</button>
<div class="dialogue" id="dialogue" style="display:none;">
  <div class="dialogue-box">
    <div class="dialogue-name" id="dialogueName"></div>
    <div class="dialogue-text" id="dialogueText"></div>
    <div class="dialogue-more" id="dialogueMore">▼ tap / E</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<script>
/* =========================================================================
   GUARDIAN OF THE HEARTH — Pokémon-style step overworld (Phaser 3)
   - Grid is the source of truth. Pixel position is derived from grid.
   - Player state machine: IDLE (accepts input) / MOVING (locked).
   - One tile per input. Tween-based movement (NOT velocity). 180ms.
   - Six buildings are solid collision tiles.
   - Guardian wanders on a timer, one tile at a time, same collision rules.
   - Camera follows smoothly, grid-aligned.
   ========================================================================= */

// ---- TUNABLE CONFIG -------------------------------------------------------
const CONFIG = {
  TILE: 40,            // tile size in px
  COLS: 16,            // grid width in tiles
  ROWS: 16,            // grid height in tiles
  MOVE_MS: 180,        // player step tween duration (Pokémon feel ~150-250ms)
  GUARDIAN_MS: 950,    // guardian wanders a step roughly every ~1s (Pokémon NPC feel)
  GUARDIAN_MOVE_MS: 220,
  FOLLOW_LERP: 0.12,   // camera smoothing
  COLORS: {
    grassA: 0x4a8c52, grassB: 0x428049, grassC: 0x55995d, grassDark: 0x3a7044,
    path: 0xc2a86e, pathB: 0xb79a60, pathEdge: 0x9c7f54, pathSpeck: 0xa88f5a,
    water: 0x3a6ea5, waterB: 0x4279b0, waterHi: 0x5b97cf,
    building: 0x6b4a2e, buildingRoof: 0x8a3b2e, buildingDoor: 0x2a1c12,
    shrine: 0xe8853d, shadow: 0x000000,
  },
};

// The six buildings as solid tiles {col,row,label}. Everything else is walkable.
const BUILDINGS = [
  { col: 3,  row: 2,  w: 2, h: 2, label: 'Home',      color: 0x8a3b2e },
  { col: 11, row: 2,  w: 2, h: 2, label: 'Garden',    color: 0x4a7a3b },
  { col: 3,  row: 12, w: 2, h: 2, label: 'Workshop',  color: 0x7a5a2e },
  { col: 11, row: 12, w: 2, h: 2, label: 'Harbor',    color: 0x3a6ea5 },
  { col: 7,  row: 6,  w: 2, h: 2, label: 'Sanctuary', color: 0x6b4a8a },
  { col: 12, row: 9,  w: 2, h: 2, label: 'Ruins',     color: 0x5a5a5a },
];
// each building's door tile = the walkable tile just below its front-left cell.
// stepping onto a door tile enters that building.
BUILDINGS.forEach(function (b) { b.door = { c: b.col, r: b.row + b.h }; });
const DOOR_AT = {};
BUILDINGS.forEach(function (b) { DOOR_AT[b.door.c + ',' + b.door.r] = b; });

// ---- ISLAND EXIT GATE (a glowing portal on the island's edge) ----
const EXIT_GATE = { col: 7, row: 15 }; // bottom edge, walkable
const EXIT_URL = './index.html';       // back to the main game

// ---- DAY / NIGHT CYCLE (cosmetic; never touches gameplay) ----
const DAYNIGHT = {
  CYCLE_MS: 720000, // 12 real minutes = one full island day (slow + peaceful)
  // phase by fraction of the cycle [0..1): dawn, day, dusk, night
  PHASES: [
    { id: 'dawn',  from: 0.0,  to: 0.18, name: 'Dawn',    tint: 0xffd0a0, dark: 0.18 },
    { id: 'day',   from: 0.18, to: 0.55, name: 'Day',     tint: 0xffffff, dark: 0.0 },
    { id: 'dusk',  from: 0.55, to: 0.72, name: 'Dusk',    tint: 0xff9a6a, dark: 0.22 },
    { id: 'night', from: 0.72, to: 1.0,  name: 'Night',   tint: 0x2a3a6e, dark: 0.55 },
  ],
};
const TimeOfDay = {
  phaseAt: function (frac) {
    for (let i = 0; i < DAYNIGHT.PHASES.length; i++) {
      const p = DAYNIGHT.PHASES[i];
      if (frac >= p.from && frac < p.to) return p;
    }
    return DAYNIGHT.PHASES[DAYNIGHT.PHASES.length - 1];
  },
};

// ---- DRAGON PERSONALITIES -------------------------------------------------
// the roaming guardian is Ember (young, playful). Sol is the elder at the Hearth.
// ---- HERO APPEARANCE OPTIONS ----------------------------------------------
const HERO_OPTS = {
  skin:  [0xffe0bd, 0xf1c27d, 0xe0ac69, 0xc68642, 0x8d5524],
  hairColor: [0x2c1b10, 0x6b3a1f, 0xc8a24a, 0xe8853d, 0xd94f6e, 0x6e5fd8, 0xededed],
  hairStyle: ['short', 'long', 'ponytail', 'bun', 'spiky'],
  eyes:  [0x4a3526, 0x2c6e49, 0x2a5fd0, 0x6e5fd8],
  outfit: [0x3a72d8, 0xd94f6e, 0x2c9e6e, 0xe8853d, 0x8a5fd8, 0x444c5e],
  emblem: [0xffd98a, 0xff6b3d, 0x7ed0ff, 0xb8ff7e, 0xff7eda],
};

// guardian options shown in the creator (Sol/Ember exist in-world; Thorn/Luna are story companions)
const GUARDIAN_CHOICES = {
  sol:   { name: 'Sol',   emoji: '🔥', blurb: 'Ancient Hearth Guardian — wise, protective, calm.' },
  ember: { name: 'Ember', emoji: '🐉', blurb: 'Young Flame Dragon — playful, energetic, curious.' },
  thorn: { name: 'Thorn', emoji: '🌿', blurb: 'Forest Guardian — quiet, gentle, patient.' },
  luna:  { name: 'Luna',  emoji: '🌙', blurb: 'Moon Guardian — mysterious, thoughtful, magical.' },
};

// Build a hero avatar as layered shapes inside a Phaser container (scene, x, y, look, tileSize).
// Returns the container. Used for BOTH the in-world avatar and the creator preview.
function buildHeroAvatar(scene, x, y, look, T) {
  const skin = HERO_OPTS.skin[look.skin % HERO_OPTS.skin.length];
  const hair = HERO_OPTS.hairColor[look.hairColor % HERO_OPTS.hairColor.length];
  const outfit = HERO_OPTS.outfit[look.outfit % HERO_OPTS.outfit.length];
  const emblem = HERO_OPTS.emblem[look.emblem % HERO_OPTS.emblem.length];
  const eyes = HERO_OPTS.eyes[look.eyes % HERO_OPTS.eyes.length];
  const style = HERO_OPTS.hairStyle[look.hairStyle % HERO_OPTS.hairStyle.length];
  const R = T * 0.30;
  const parts = [];
  // body / outfit (rounded torso)
  parts.push(scene.add.ellipse(0, R * 0.95, R * 1.5, R * 1.5, outfit));
  // emblem on chest
  parts.push(scene.add.circle(0, R * 0.95, R * 0.28, emblem));
  // head
  parts.push(scene.add.circle(0, -R * 0.35, R, skin).setStrokeStyle(2, 0x000000, 0.25));
  // eyes
  parts.push(scene.add.circle(-R * 0.32, -R * 0.4, R * 0.14, eyes));
  parts.push(scene.add.circle(R * 0.32, -R * 0.4, R * 0.14, eyes));
  // hair by style (drawn over the head)
  if (style === 'short') {
    parts.push(scene.add.ellipse(0, -R * 0.85, R * 2.05, R * 1.2, hair));
  } else if (style === 'long') {
    parts.push(scene.add.ellipse(0, -R * 0.6, R * 2.2, R * 2.0, hair));
    parts.push(scene.add.circle(0, -R * 0.35, R, skin)); // face front again
    parts.push(scene.add.ellipse(0, -R * 0.9, R * 2.05, R * 1.1, hair));
  } else if (style === 'ponytail') {
    parts.push(scene.add.ellipse(R * 0.9, -R * 0.2, R * 0.7, R * 1.4, hair));
    parts.push(scene.add.ellipse(0, -R * 0.9, R * 2.05, R * 1.1, hair));
  } else if (style === 'bun') {
    parts.push(scene.add.circle(0, -R * 1.35, R * 0.55, hair));
    parts.push(scene.add.ellipse(0, -R * 0.9, R * 2.05, R * 1.1, hair));
  } else { // spiky
    for (let i = -2; i <= 2; i++) {
      parts.push(scene.add.triangle(i * R * 0.45, -R * 1.1, 0, -R * 0.7, -R * 0.25, 0, R * 0.25, 0, hair));
    }
    parts.push(scene.add.ellipse(0, -R * 0.85, R * 2.0, R * 0.9, hair));
  }
  // smile
  const mouth = scene.add.arc(0, -R * 0.05, R * 0.3, 20, 160, false, 0x000000, 0.4);
  mouth.setStrokeStyle(2, 0x000000, 0.4);
  parts.push(mouth);
  const cont = scene.add.container(x, y, parts);
  return cont;
}

const DRAGONS = {
  ember: {
    name: 'Ember', emoji: '🐉', title: 'young fire dragon',
    lines: [
      'Ember bounces over! "Wanna explore? I love exploring!"',
      '"I saw a shiny thing near the ruins once. Or did I dream it?"',
      '"You\'re my favorite Keeper. Don\'t tell the others!"',
      '"The elder Sol knows EVERYTHING. You should visit the Hearth."',
      '"Race you to the harbor! ...later. I\'m sleepy now."',
    ],
  },
  sol: {
    name: 'Sol', emoji: '🔥', title: 'the ancient hearth guardian',
    lines: [
      'Sol\'s warm voice fills the air. "Welcome, young Keeper."',
      '"Every kindness you show feeds the First Flame."',
      '"Restore the village, and the island will remember you."',
      '"I have watched over this hearth since before the islands rose."',
    ],
  },
};

// ---- PROGRESSION CONFIG ---------------------------------------------------
// building states: 'locked' | 'unlocked' | 'active'. Start with 2 unlocked; others locked.
const START_UNLOCKED = ['Home', 'Sanctuary'];
// which interactions unlock which buildings (talk to dragon N times -> unlock more)
const UNLOCK_RULES = [
  { afterTalks: 1, unlock: 'Garden' },
  { afterTalks: 2, unlock: 'Workshop' },
  { afterTalks: 3, unlock: 'Harbor' },
  { afterTalks: 4, unlock: 'Ruins' },
];

// ---- DRAGON DIALOGUE ------------------------------------------------------
const DRAGON_LINES = [
  'The dragon watches you quietly\u2026',
  'It seems calm today.',
  'Something stirs deep in the island\u2026',
  'The dragon tilts its head, studying you.',
  'A warm ember-glow flickers in its eyes.',
  'It lets out a soft, rumbling purr.',
];
function buildingWelcome(label) {
  const map = {
    Home: 'The hearth burns warm here. This is home.',
    Garden: 'Glowing herbs and shy mushrooms grow in neat rows.',
    Workshop: 'Tools and half-built wonders rest on the benches.',
    Harbor: 'Little boats bob, waiting for far journeys.',
    Sanctuary: 'A peaceful nest among the branches. The guardian rests here.',
    Ruins: 'Old stones hum with forgotten rune-magic.',
  };
  return map[label] || ('Inside the ' + label + '.');
}

// ---- SAVE / LOAD (localStorage) -------------------------------------------
// ---- HERO ROSTER + PER-HERO SAVES -----------------------------------------
// The roster (which slots exist + the currently active hero) is stored once.
// Each hero's adventure is stored under its own key, so switching heroes loads
// a completely independent world. ALL existing game systems read Save.data, so
// making Save.data per-hero makes the whole game per-hero with no logic changes.
const ROSTER_KEY = 'goth_island_roster_v1';
const HERO_KEY = function (id) { return 'goth_island_hero_' + id + '_v1'; };
function freshHeroData() {
  return { px: 7, py: 10, talks: 0, unlocked: START_UNLOCKED.slice(), flags: {},
    quests: {}, friendship: {}, villageLevel: {}, dayStart: 0 };
}
const Roster = {
  data: { heroes: [], activeId: null }, // heroes: [{id,name,title,look,guardian}]
  load: function () {
    try { const raw = localStorage.getItem(ROSTER_KEY); if (raw) { const d = JSON.parse(raw); if (d && Array.isArray(d.heroes)) this.data = d; } } catch (e) {}
    return this.data;
  },
  save: function () { try { localStorage.setItem(ROSTER_KEY, JSON.stringify(this.data)); } catch (e) {} },
  list: function () { return this.data.heroes; },
  get: function (id) { return this.data.heroes.find(function (h) { return h.id === id; }) || null; },
  active: function () { return this.get(this.data.activeId); },
  setActive: function (id) { this.data.activeId = id; this.save(); },
  add: function (hero) {
    hero.id = 'h' + Date.now() + Math.floor(Math.random() * 1000);
    this.data.heroes.push(hero); this.data.activeId = hero.id; this.save();
    // seed a fresh adventure save for this hero
    try { localStorage.setItem(HERO_KEY(hero.id), JSON.stringify(freshHeroData())); } catch (e) {}
    return hero;
  },
  remove: function (id) {
    this.data.heroes = this.data.heroes.filter(function (h) { return h.id !== id; });
    if (this.data.activeId === id) this.data.activeId = this.data.heroes.length ? this.data.heroes[0].id : null;
    try { localStorage.removeItem(HERO_KEY(id)); } catch (e) {}
    this.save();
  },
};

const Save = {
  data: freshHeroData(),
  heroId: null,
  load: function (heroId) {
    // load a specific hero's adventure into Save.data
    if (heroId) this.heroId = heroId;
    const id = this.heroId;
    this.data = freshHeroData();
    if (!id) return this.data;
    try {
      const raw = localStorage.getItem(HERO_KEY(id));
      if (raw) {
        const d = JSON.parse(raw);
        if (d && typeof d.px === 'number') {
          this.data = Object.assign(freshHeroData(), d);
          if (!Array.isArray(this.data.unlocked)) this.data.unlocked = START_UNLOCKED.slice();
        }
      }
    } catch (e) {}
    return this.data;
  },
  save: function () {
    if (!this.heroId) return;
    try { localStorage.setItem(HERO_KEY(this.heroId), JSON.stringify(this.data)); } catch (e) {}
  },
  isUnlocked: function (label) { return Save.data.unlocked.indexOf(label) !== -1; },
  unlock: function (label) {
    if (Save.data.unlocked.indexOf(label) === -1) { Save.data.unlocked.push(label); Save.save(); return true; }
    return false;
  },
};

const DIRS = {
  up:    { dx: 0,  dy: -1 },
  down:  { dx: 0,  dy: 1 },
  left:  { dx: -1, dy: 0 },
  right: { dx: 1,  dy: 0 },
};

// ---- WORLD STATE ----------------------------------------------------------
const WORLD = {
  blocked: {},  // "col,row" -> building object
};
function key(c, r) { return c + ',' + r; }
BUILDINGS.forEach(function (b) {
  for (let dc = 0; dc < b.w; dc++) {
    for (let dr = 0; dr < b.h; dr++) {
      WORLD.blocked[key(b.col + dc, b.row + dr)] = b;
    }
  }
});

function isWalkable(c, r) {
  if (c < 0 || r < 0 || c >= CONFIG.COLS || r >= CONFIG.ROWS) return false;
  if (WORLD.blocked[key(c, r)]) return false;
  return true;
}

// ---- AMBIENT SOUND (synthesized; no files; gentle, time-aware) ------------
const Ambient = {
  ctx: null, on: true, nodes: [], phase: null,
  ensure: function () {
    if (this.ctx) return this.ctx;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { this.ctx = null; }
    return this.ctx;
  },
  // a soft wind bed (filtered noise) that's always present, quieter at night
  startBed: function () {
    const c = this.ensure(); if (!c || this._bed) return;
    const n = c.createBufferSource();
    const buf = c.createBuffer(1, c.sampleRate * 2, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    n.buffer = buf; n.loop = true;
    const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 420;
    const g = c.createGain(); g.gain.value = 0.0;
    n.connect(f); f.connect(g); g.connect(c.destination);
    n.start();
    this._bed = { gain: g, filter: f };
  },
  setPhase: function (phaseId) {
    if (this.phase === phaseId) return;
    this.phase = phaseId;
    const c = this.ensure(); if (!c || !this._bed) return;
    // wind louder/cooler at night, soft and warm by day
    const target = (phaseId === 'night') ? 0.05 : (phaseId === 'dusk' || phaseId === 'dawn') ? 0.035 : 0.025;
    this._bed.gain.gain.setTargetAtTime(this.on ? target : 0, c.currentTime, 1.5);
    this._bed.filter.frequency.setTargetAtTime(phaseId === 'night' ? 320 : 520, c.currentTime, 1.5);
    // a gentle chime cluster on phase change (magical tone)
    if (this.on) this.chime(phaseId === 'night' ? [392, 523, 659] : [523, 659, 784]);
  },
  chime: function (freqs) {
    const c = this.ensure(); if (!c) return;
    freqs.forEach(function (fr, i) {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine'; o.frequency.value = fr;
      g.gain.setValueAtTime(0.0001, c.currentTime + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.04, c.currentTime + i * 0.12 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + i * 0.12 + 1.2);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime + i * 0.12); o.stop(c.currentTime + i * 0.12 + 1.3);
    });
  },
  toggle: function () { this.on = !this.on; if (!this.on && this._bed) this._bed.gain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3); else this.setPhase(this.phase || 'day'); return this.on; },
};

// ---- SCENE ----------------------------------------------------------------
class IslandScene extends Phaser.Scene {
  constructor() { super('island'); }

  preload() {
    // load the real dragon sprite; if it 404s we fall back to the emoji token (world never breaks)
    this.dragonLoaded = false;
    this.load.image('dragon', './guardian-dragon-cheer2.png');
    this.load.on('filecomplete-image-dragon', function () { this.dragonLoaded = true; }, this);
    this.load.on('loaderror', function () { this.dragonLoaded = false; }, this);
  }

  create() {
    const T = CONFIG.TILE;
    this.cameras.main.setBackgroundColor('#1a1410');
    this.cameras.main.setBounds(0, 0, CONFIG.COLS * T, CONFIG.ROWS * T);

    // --- draw the tile map: layered grass + dirt path (VISUAL ONLY, grid unchanged) ---
    const C = CONFIG.COLORS;
    const g = this.add.graphics();
    // deterministic per-tile noise so it never flickers between frames
    function tileRand(c, r) { let n = (c * 73856093) ^ (r * 19349663); n = (n << 13) ^ n; return ((n * (n * n * 15731 + 789221) + 1376312589) & 0x7fffffff) / 0x7fffffff; }
    for (let c = 0; c < CONFIG.COLS; c++) {
      for (let r = 0; r < CONFIG.ROWS; r++) {
        const onPath = (c === 7 || c === 8 || r === 7 || r === 8);
        const x = c * T, y = r * T, rnd = tileRand(c, r);
        if (onPath) {
          // dirt path with subtle tone variation + speckles
          g.fillStyle(rnd > 0.5 ? C.path : C.pathB, 1);
          g.fillRect(x, y, T, T);
          g.fillStyle(C.pathSpeck, 0.5);
          for (let s = 0; s < 3; s++) {
            const sx = x + 4 + tileRand(c + s * 7, r) * (T - 8);
            const sy = y + 4 + tileRand(c, r + s * 7) * (T - 8);
            g.fillRect(sx, sy, 3, 3);
          }
        } else {
          // grass: pick one of several greens by noise, then add lighter blades
          let base = C.grassA;
          if (rnd < 0.25) base = C.grassB; else if (rnd < 0.5) base = C.grassC; else if (rnd < 0.62) base = C.grassDark;
          g.fillStyle(base, 1);
          g.fillRect(x, y, T, T);
          // a few lighter grass blades for texture
          g.fillStyle(C.grassC, 0.4);
          for (let b = 0; b < 4; b++) {
            const bx = x + 5 + tileRand(c + b * 3, r * 2) * (T - 10);
            const by = y + 6 + tileRand(c * 2, r + b * 3) * (T - 12);
            g.fillRect(bx, by, 2, 5);
          }
        }
        // very subtle tile separation
        g.lineStyle(1, 0x000000, 0.05);
        g.strokeRect(x, y, T, T);
      }
    }

    // --- buildings: real structures with shadow, walls, and a ROOF layer above the player ---
    // (collision logic untouched; this is purely how they're drawn + depth-sorted)
    this.buildingLabels = [];
    // depth layers: ground=0, shadows=1, walls=2, entities=10, roofs=20 (above player), labels=22
    const wallG = this.add.graphics().setDepth(2);
    const shadowG = this.add.graphics().setDepth(1);
    const roofG = this.add.graphics().setDepth(20); // ABOVE entities → player walks "behind" roofs
    BUILDINGS.forEach(function (b) {
      const x = b.col * T, y = b.row * T, w = b.w * T, h = b.h * T;
      // soft drop shadow on the ground
      shadowG.fillStyle(C.shadow, 0.28);
      shadowG.fillEllipse(x + w / 2, y + h - 4, w * 0.92, h * 0.42);
      // wall body (lower 60%)
      const wallTop = y + h * 0.4;
      const wallShade = Phaser.Display.Color.IntegerToColor(b.color).darken(18).color;
      wallG.fillStyle(wallShade, 1);
      wallG.fillRect(x + 4, wallTop, w - 8, h - (wallTop - y) - 4);
      // wall highlight stripe
      wallG.fillStyle(Phaser.Display.Color.IntegerToColor(b.color).lighten(8).color, 1);
      wallG.fillRect(x + 4, wallTop, w - 8, 4);
      // door
      wallG.fillStyle(C.buildingDoor, 1);
      wallG.fillRect(x + w * 0.42, y + h - h * 0.32, w * 0.16, h * 0.28);
      wallG.fillStyle(0xE8C56A, 0.9); // doorknob
      wallG.fillCircle(x + w * 0.52, y + h - h * 0.18, 1.6);
      // windows
      wallG.fillStyle(0xFFE0A0, 0.85);
      wallG.fillRect(x + w * 0.18, wallTop + 8, w * 0.14, h * 0.14);
      wallG.fillRect(x + w * 0.68, wallTop + 8, w * 0.14, h * 0.14);
      // wall outline
      wallG.lineStyle(2, 0x000000, 0.3);
      wallG.strokeRect(x + 4, wallTop, w - 8, h - (wallTop - y) - 4);

      // ROOF (upper 50%, peaked) — drawn ABOVE the player so they pass behind it
      const roofColor = Phaser.Display.Color.IntegerToColor(b.color).lighten(6).color;
      roofG.fillStyle(roofColor, 1);
      roofG.beginPath();
      roofG.moveTo(x + 2, wallTop + 4);
      roofG.lineTo(x + w / 2, y - h * 0.12);
      roofG.lineTo(x + w - 2, wallTop + 4);
      roofG.closePath();
      roofG.fillPath();
      // roof shade underside
      roofG.fillStyle(0x000000, 0.18);
      roofG.fillRect(x + 2, wallTop, w - 4, 5);
      // roof ridge highlight
      roofG.lineStyle(2, Phaser.Display.Color.IntegerToColor(b.color).lighten(22).color, 0.8);
      roofG.beginPath();
      roofG.moveTo(x + w / 2, y - h * 0.12);
      roofG.lineTo(x + w / 2, wallTop + 4);
      roofG.strokePath();

      const lbl = this.add.text(x + w / 2, y - h * 0.16, b.label, {
        fontFamily: 'system-ui', fontSize: '12px', color: '#EDE3D2',
        stroke: '#000000', strokeThickness: 4,
      }).setOrigin(0.5, 1).setDepth(22);
      this.buildingLabels.push(lbl);
    }, this);

    // --- the Hearth: the glowing soul of the island ---
    const hx = 7.5 * T, hy = 7.5 * T;
    this.add.circle(hx, hy + 6, 16, 0x000000, 0.25).setDepth(1); // shadow
    this.add.circle(hx, hy, 13, 0x4a3526).setStrokeStyle(2, 0x2a1c12).setDepth(4); // stone ring
    this.shrineGlow = this.add.circle(hx, hy, 22, 0xe8853d, 0.35).setDepth(4);
    this.shrine = this.add.circle(hx, hy, 7, 0xFFD98A).setDepth(5);
    this.tweens.add({ targets: this.shrineGlow, scale: 1.4, alpha: 0.18, duration: 1100, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: this.shrine, scale: 1.25, duration: 700, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- SOL, the elder dragon, resting beside the Hearth (stationary NPC) ---
    const solX = (7.5 + 1.2) * T, solY = 7.5 * T;
    this.add.ellipse(solX, solY + T * 0.26, T * 0.5, T * 0.22, 0x000000, 0.28).setDepth(8);
    this.solGlow = this.add.circle(solX, solY, T * 0.4, 0xff7a3d, 0.32).setDepth(8);
    this.solSprite = this.add.container(solX, solY, [
      this.add.circle(0, 2, T * 0.33, 0xb8401e),
      this.add.circle(0, 0, T * 0.29, 0xff7a3d).setStrokeStyle(2.5, 0xffd98a),
      this.add.text(0, -1, '🔥', { fontSize: '22px' }).setOrigin(0.5),
    ]).setDepth(9);
    this.sol = { gridX: 8, gridY: 7 }; // grid tile for proximity (near Hearth, walkable-adjacent)
    this.tweens.add({ targets: this.solSprite, scaleX: 1.04, scaleY: 0.96, duration: 1600, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: this.solGlow, alpha: 0.14, scale: 1.2, duration: 1600, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- EXIT GATE: a shimmering portal at the island's edge ---
    const exX = (EXIT_GATE.col + 0.5) * T, exY = (EXIT_GATE.row + 0.5) * T;
    this.add.ellipse(exX, exY + T * 0.3, T * 0.7, T * 0.25, 0x000000, 0.3).setDepth(1);
    // two stone pillars
    const gateG = this.add.graphics().setDepth(4);
    gateG.fillStyle(0x5a4a6e, 1);
    gateG.fillRect(exX - T * 0.5, exY - T * 0.5, T * 0.18, T);
    gateG.fillRect(exX + T * 0.32, exY - T * 0.5, T * 0.18, T);
    gateG.fillStyle(0x7a6a9e, 1);
    gateG.fillRect(exX - T * 0.55, exY - T * 0.55, T * 1.1, T * 0.12);
    // swirling portal glow between pillars
    this.exitGlow = this.add.ellipse(exX, exY, T * 0.6, T * 0.85, 0x9b7ed8, 0.55).setDepth(3);
    this.add.ellipse(exX, exY, T * 0.35, T * 0.6, 0xd0b8ff, 0.6).setDepth(3);
    this.add.text(exX, exY - T * 0.7, '✨ Gate ✨', { fontFamily: 'system-ui', fontSize: '11px',
      color: '#d0b8ff', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5).setDepth(5);
    this.tweens.add({ targets: this.exitGlow, scaleX: 1.2, alpha: 0.35, duration: 1200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- PLAYER (grid is truth) ---
    this.player = {
      gridX: 7, gridY: 10, state: 'IDLE', facing: 'up',
    };
    const px = this.tileToPx(this.player.gridX), py = this.tileToPx(this.player.gridY);
    // soft shadow that lives just under the player (its own depth, follows in sync)
    this.playerShadow = this.add.ellipse(px, py + T * 0.28, T * 0.5, T * 0.22, 0x000000, 0.3).setDepth(9);
    // custom HERO avatar built from the active hero's appearance choices
    const hero = Roster.active();
    const look = (hero && hero.look) ? hero.look : { skin:0, hairColor:0, hairStyle:0, eyes:0, outfit:0, emblem:0 };
    this.playerSprite = buildHeroAvatar(this, px, py, look, T).setDepth(10);
    // directional notch shows which way the player faces
    this.facer = this.add.triangle(px, py, 0, -7, -6, 5, 6, 5, 0xffffff, 0.95).setDepth(11);
    // gentle idle breathing (visual only — never moves the grid position)
    this.tweens.add({ targets: this.playerSprite, scaleX: 1.05, scaleY: 0.95, duration: 1300,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- GUARDIAN (also grid-based, wanders on a timer) ---
    this.guardian = { gridX: 7, gridY: 11, state: 'IDLE' };
    const gx = this.tileToPx(this.guardian.gridX), gy = this.tileToPx(this.guardian.gridY);
    this.guardianShadow = this.add.ellipse(gx, gy + T * 0.26, T * 0.46, T * 0.2, 0x000000, 0.28).setDepth(8);
    this.guardianGlow = this.add.circle(gx, gy, T * 0.34, 0xe8853d, 0.3).setDepth(8);
    // dragon token: real sprite if it loaded, otherwise the styled emoji fallback
    let dragonVisual;
    if (this.dragonLoaded && this.textures.exists('dragon')) {
      dragonVisual = this.add.image(0, -2, 'dragon');
      const ds = (T * 1.5) / Math.max(dragonVisual.width, dragonVisual.height); // fit to ~1.5 tiles
      dragonVisual.setScale(ds);
    } else {
      dragonVisual = this.add.text(0, -1, '🐲', { fontSize: '20px' }).setOrigin(0.5);
    }
    this.guardianSprite = this.add.container(gx, gy, [dragonVisual]).setDepth(9);
    this.dragonVisual = dragonVisual;
    // idle LIFE (visual only — never affects the grid target the wander AI sets):
    // gentle breathing pulse on the dragon itself + a soft vertical float + glow pulse.
    this.tweens.add({ targets: this.dragonVisual, scaleX: this.dragonVisual.scaleX * 1.04,
      scaleY: this.dragonVisual.scaleY * 1.04, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: this.dragonVisual, y: this.dragonVisual.y - 2.5, duration: 1900,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: this.guardianGlow, alpha: 0.12, scale: 1.2, duration: 1400,
      yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // --- camera follows player, smooth + grid stable ---
    this.cameras.main.startFollow(this.playerSprite, true, CONFIG.FOLLOW_LERP, CONFIG.FOLLOW_LERP);
    this.cameras.main.setZoom(this.computeZoom());
    this.scale.on('resize', function () { this.cameras.main.setZoom(this.computeZoom()); }, this);

    // --- INPUT: arrow keys -> discrete steps ---
    this.cursors = this.input.keyboard.createCursorKeys();
    this.heldDir = null;

    // touch d-pad
    const self = this;
    document.querySelectorAll('.pad button').forEach(function (btn) {
      const dir = btn.getAttribute('data-dir');
      btn.addEventListener('touchstart', function (e) { e.preventDefault(); self.heldDir = dir; }, { passive: false });
      btn.addEventListener('touchend', function (e) { e.preventDefault(); if (self.heldDir === dir) self.heldDir = null; }, { passive: false });
      btn.addEventListener('mousedown', function () { self.heldDir = dir; });
      btn.addEventListener('mouseup', function () { if (self.heldDir === dir) self.heldDir = null; });
    });

    // --- guardian wander timer (turn-based timing, independent of player) ---
    this.time.addEvent({
      delay: CONFIG.GUARDIAN_MS, loop: true,
      callback: this.guardianStep, callbackScope: this,
    });

    this.hud = document.getElementById('hud');
    if (this.hud) this.hud.textContent = 'Hearth Island';

    // sound toggle
    const sndBtn = document.getElementById('soundBtn');
    if (sndBtn) {
      const self2 = this;
      const tog = function (e) { if (e) e.preventDefault(); const on = Ambient.toggle(); sndBtn.textContent = on ? '\uD83D\uDD0A' : '\uD83D\uDD07'; };
      sndBtn.addEventListener('touchstart', tog, { passive: false });
      sndBtn.addEventListener('click', tog);
    }

    // ---- restore saved player position (grid truth) ----
    Save.load();

    // ==== LIVING WORLD: atmosphere layers (all cosmetic, camera-fixed where needed) ====
    const worldW = CONFIG.COLS * T, worldH = CONFIG.ROWS * T;
    // sky tint overlay — covers the world, color/alpha set each frame by time of day
    this.skyTint = this.add.rectangle(worldW / 2, worldH / 2, worldW + 200, worldH + 200, 0x2a3a6e, 0)
      .setDepth(30).setBlendMode(Phaser.BlendModes.MULTIPLY);
    // a second screen layer for warm/cool wash
    this.skyWash = this.add.rectangle(worldW / 2, worldH / 2, worldW + 200, worldH + 200, 0xffffff, 0)
      .setDepth(31).setBlendMode(Phaser.BlendModes.OVERLAY);

    // FIREFLIES (night only) — gentle drifting motes
    this.fireflies = [];
    for (let i = 0; i < 18; i++) {
      const fx = Math.random() * worldW, fy = Math.random() * worldH;
      const f = this.add.circle(fx, fy, 2.2, 0xffe9a0, 0).setDepth(15);
      this.fireflies.push(f);
      this.tweens.add({ targets: f, x: fx + (Math.random() * 60 - 30), y: fy + (Math.random() * 60 - 30),
        duration: 3000 + Math.random() * 3000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
      this.tweens.add({ targets: f, scale: 1.6, duration: 1200 + Math.random() * 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    }

    // DRIFTING CLOUDS (soft shadows that cross the island)
    this.clouds = [];
    for (let i = 0; i < 4; i++) {
      const cy = Math.random() * worldH;
      const cloud = this.add.ellipse(Math.random() * worldW, cy, 120 + Math.random() * 80, 50 + Math.random() * 30, 0xffffff, 0.08).setDepth(28);
      this.clouds.push(cloud);
      this.tweens.add({ targets: cloud, x: worldW + 150, duration: 28000 + Math.random() * 18000,
        repeat: -1, onRepeat: function () { cloud.x = -150; cloud.y = Math.random() * worldH; }, ease: 'Linear' });
    }

    // FALLING LEAVES (wind) — a few drifting down + sideways
    this.leaves = [];
    for (let i = 0; i < 10; i++) {
      const lf = this.add.text(Math.random() * worldW, Math.random() * worldH, '🍃',
        { fontSize: '13px' }).setOrigin(0.5).setAlpha(0.7).setDepth(16);
      this.leaves.push(lf);
      const startY = Math.random() * worldH;
      this.tweens.add({ targets: lf, y: startY + worldH, x: '+=' + (40 + Math.random() * 60),
        angle: 360, duration: 9000 + Math.random() * 6000, repeat: -1,
        onRepeat: function () { lf.y = -20; lf.x = Math.random() * worldW; }, ease: 'Sine.easeInOut' });
    }

    // chimney smoke from each building (rises softly, denser look in morning)
    this.smoke = [];
    BUILDINGS.forEach(function (b) {
      const sx = b.col * T + b.w * T * 0.5, sy = b.row * T - 4;
      for (let s = 0; s < 2; s++) {
        const puff = this.add.circle(sx + (s * 4 - 2), sy, 4, 0xcccccc, 0).setDepth(19);
        this.smoke.push(puff);
        this.tweens.add({ targets: puff, y: sy - 30, alpha: { from: 0.25, to: 0 }, scale: 1.8,
          duration: 3000, delay: s * 1500, repeat: -1, ease: 'Sine.easeOut' });
      }
    }, this);

    // window glow per building (night) — warm light
    this.windowGlows = [];
    BUILDINGS.forEach(function (b) {
      const wx = b.col * T + b.w * T * 0.5, wy = b.row * T + b.h * T * 0.55;
      const glow = this.add.circle(wx, wy, b.w * T * 0.4, 0xffce6b, 0).setDepth(18);
      this.windowGlows.push(glow);
    }, this);

    // initialize / restore the cycle clock
    if (!Save.data.dayStart) { Save.data.dayStart = Date.now(); Save.save(); }
    this.dayFrac = 0;
    this.lastPhase = null;
    if (isWalkable(Save.data.px, Save.data.py)) {
      this.player.gridX = Save.data.px; this.player.gridY = Save.data.py;
      this.playerSprite.x = this.tileToPx(Save.data.px);
      this.playerSprite.y = this.tileToPx(Save.data.py);
      this.syncFacer();
    }

    // ---- dialogue state ----
    this.dialogue = { active: false, full: '', shown: 0, timer: null, onClose: null };
    this.dlgEl = document.getElementById('dialogue');
    this.dlgName = document.getElementById('dialogueName');
    this.dlgText = document.getElementById('dialogueText');
    this.talkBtn = document.getElementById('talkBtn');

    // talk key + button (reuse self from above)
    this.input.keyboard.on('keydown-E', function () { self.onTalkKey(); });
    if (this.talkBtn) {
      this.talkBtn.addEventListener('touchstart', function (e) { e.preventDefault(); self.onTalkKey(); }, { passive: false });
      this.talkBtn.addEventListener('click', function () { self.onTalkKey(); });
    }
    // tapping the dialogue advances/closes it
    if (this.dlgEl) {
      this.dlgEl.addEventListener('touchstart', function (e) { e.preventDefault(); self.advanceDialogue(); }, { passive: false });
      this.dlgEl.addEventListener('click', function () { self.advanceDialogue(); });
    }
    this.input.keyboard.on('keydown-SPACE', function () { if (self.dialogue.active) self.advanceDialogue(); });

    // apply building locked/unlocked visuals
    this.applyBuildingStates();
  }

  // ---- DIALOGUE SYSTEM (typewriter) ----
  startDialogue(name, text, onClose) {
    this.dialogue.active = true;
    this.dialogue.full = text;
    this.dialogue.shown = 0;
    this.dialogue.onClose = onClose || null;
    if (this.dlgName) this.dlgName.textContent = name;
    if (this.dlgText) this.dlgText.textContent = '';
    if (this.dlgEl) this.dlgEl.style.display = 'block';
    if (this.talkBtn) this.talkBtn.style.display = 'none';
    this.player.state = 'MOVING'; // lock movement during dialogue
    const self = this;
    if (this.dialogue.timer) clearInterval(this.dialogue.timer);
    this.dialogue.timer = setInterval(function () {
      self.dialogue.shown++;
      if (self.dlgText) self.dlgText.textContent = self.dialogue.full.slice(0, self.dialogue.shown);
      if (self.dialogue.shown >= self.dialogue.full.length) { clearInterval(self.dialogue.timer); self.dialogue.timer = null; }
    }, 28);
  }
  advanceDialogue() {
    if (!this.dialogue.active) return;
    // if still typing, reveal all; else close
    if (this.dialogue.timer) {
      clearInterval(this.dialogue.timer); this.dialogue.timer = null;
      this.dialogue.shown = this.dialogue.full.length;
      if (this.dlgText) this.dlgText.textContent = this.dialogue.full;
      return;
    }
    this.closeDialogue();
  }
  closeDialogue() {
    this.dialogue.active = false;
    if (this.dlgEl) this.dlgEl.style.display = 'none';
    this.player.state = 'IDLE'; // resume control
    const cb = this.dialogue.onClose; this.dialogue.onClose = null;
    if (cb) cb();
  }

  // ---- TALK: pressing E near the dragon ----
  onTalkKey() {
    if (this.dialogue.active) { this.advanceDialogue(); return; }
    if (this.player.state !== 'IDLE') return;
    const self = this;
    const dist = function (gx, gy) { return Math.abs(self.player.gridX - gx) + Math.abs(self.player.gridY - gy); };

    // 1) EXIT GATE has priority — leave the island
    if (dist(EXIT_GATE.col, EXIT_GATE.row) <= 1) { this.leaveIsland(); return; }

    // 2) SOL the elder (near the Hearth) — wise guidance, advances quests
    if (this.sol && dist(this.sol.gridX, this.sol.gridY) <= 2) {
      Save.data.friendship.sol = (Save.data.friendship.sol || 0) + 1;
      const line = DRAGONS.sol.lines[(Save.data.friendship.sol - 1) % DRAGONS.sol.lines.length];
      Save.save();
      this.startDialogue(DRAGONS.sol.emoji + ' ' + DRAGONS.sol.name + ' \u00b7 elder', line, function () { self.onMetSol(); });
      return;
    }

    // 3) EMBER the roaming dragon — playful, drives village unlocks
    if (dist(this.guardian.gridX, this.guardian.gridY) <= 2) {
      Save.data.friendship.ember = (Save.data.friendship.ember || 0) + 1;
      Save.data.talks += 1;
      const line = DRAGONS.ember.lines[(Save.data.friendship.ember - 1) % DRAGONS.ember.lines.length];
      Save.save();
      this.startDialogue(DRAGONS.ember.emoji + ' ' + DRAGONS.ember.name + ' \u00b7 ' + DRAGONS.ember.title, line, function () { self.checkUnlocks(); });
      return;
    }
  }

  // ---- QUEST: meeting Sol completes 'The First Flame' and unlocks Garden ----
  onMetSol() {
    const self = this;
    if (!Save.data.quests.firstFlame) {
      Save.data.quests.firstFlame = true;
      Save.unlock('Garden');
      Save.save();
      this.applyBuildingStates();
      this.startDialogue('\u2728 Quest complete', 'The First Flame \u2014 you met Sol, the elder. The Garden awakens!', null);
    }
  }

  // ---- EXIT: fade out, save, return to the main game ----
  leaveIsland() {
    if (this._leaving) return;
    this._leaving = true;
    this.player.state = 'MOVING';
    Save.data.px = this.player.gridX; Save.data.py = this.player.gridY; Save.save();
    if (this.hud) this.hud.textContent = '\u2728 Leaving the island\u2026';
    const cam = this.cameras.main;
    cam.fadeOut(450, 12, 10, 24);
    cam.once('camerafadeoutcomplete', function () { window.location.href = EXIT_URL; });
  }

  // ---- PROGRESSION: unlock buildings after enough talks ----
  checkUnlocks() {
    const self = this;
    for (let i = 0; i < UNLOCK_RULES.length; i++) {
      const rule = UNLOCK_RULES[i];
      if (Save.data.talks >= rule.afterTalks && !Save.isUnlocked(rule.unlock)) {
        Save.unlock(rule.unlock);
        self.applyBuildingStates();
        self.startDialogue('\u2728 The island stirs', 'The ' + rule.unlock + ' has awakened! You can enter it now.', null);
        return; // one unlock per talk
      }
    }
  }

  // ---- building locked/unlocked visuals (locked = dimmed + 🔒) ----
  applyBuildingStates() {
    if (!this._lockIcons) this._lockIcons = {};
    const T = CONFIG.TILE;
    const self = this;
    BUILDINGS.forEach(function (b) {
      const unlocked = Save.isUnlocked(b.label);
      // lock icon over locked buildings
      if (!unlocked && !self._lockIcons[b.label]) {
        const cx = b.col * T + (b.w * T) / 2, cy = b.row * T + (b.h * T) / 2;
        self._lockIcons[b.label] = self.add.text(cx, cy, '🔒', { fontSize: '22px' }).setOrigin(0.5).setDepth(21);
      } else if (unlocked && self._lockIcons[b.label]) {
        self._lockIcons[b.label].destroy(); self._lockIcons[b.label] = null;
      }
    });
  }

  computeZoom() {
    // fit the grid comfortably; zoom so ~9 tiles tall are visible
    const visibleTiles = 9;
    const z = (this.scale.height) / (visibleTiles * CONFIG.TILE);
    return Math.max(1, Math.min(2.4, z));
  }

  tileToPx(t) { return t * CONFIG.TILE + CONFIG.TILE / 2; }

  // ---- PLAYER STEP: validate -> lock -> tween -> unlock ----
  tryMove(dir) {
    if (this.player.state !== 'IDLE') return;          // input locked during movement
    const d = DIRS[dir];
    this.player.facing = dir;
    this.updateFacer();
    const tc = this.player.gridX + d.dx, tr = this.player.gridY + d.dy;
    // blocked by terrain/buildings OR by the guardian standing there
    const guardianThere = (tc === this.guardian.gridX && tr === this.guardian.gridY);
    if (!isWalkable(tc, tr) || guardianThere) {
      const b = WORLD.blocked[key(tc, tr)];
      if (b && this.hud) { this.hud.textContent = '🚪 ' + b.label; }
      this.bump(dir);
      return;
    }
    this.player.state = 'MOVING';
    this.player.gridX = tc; this.player.gridY = tr;     // grid updates AFTER validation
    if (this.hud) this.hud.textContent = 'Hearth Island';
    const nx = this.tileToPx(tc), ny = this.tileToPx(tr);
    const self = this;
    this.tweens.add({
      targets: [this.playerSprite, this.facer], x: nx, y: ny,
      duration: CONFIG.MOVE_MS, ease: 'Linear',
      onUpdate: function () { self.syncFacer(); },
      onComplete: function () {
        // hard snap to the grid so sprite can never drift from grid truth
        self.playerSprite.x = self.tileToPx(self.player.gridX);
        self.playerSprite.y = self.tileToPx(self.player.gridY);
        self.player.state = 'IDLE';
        self.syncFacer();
        // building entry: did we land on a door tile?
        // save position after every completed step
        Save.data.px = self.player.gridX; Save.data.py = self.player.gridY; Save.save();
        // building entry: did we land on a door tile?
        const b = DOOR_AT[self.player.gridX + ',' + self.player.gridY];
        if (b) {
          if (Save.isUnlocked(b.label)) self.enterBuilding(b);
          else self.startDialogue('\uD83D\uDD12 ' + b.label, 'This place is still sleeping. Talk to the dragon to awaken the island.', null);
        }
      },
    });
  }

  // FADE OUT -> launch interior scene -> (interior fades in). Movement state preserved on return.
  enterBuilding(b) {
    if (this._entering) return;
    this._entering = true;
    this.player.state = 'MOVING'; // lock input during transition
    const cam = this.cameras.main;
    cam.fadeOut(280, 16, 12, 9);
    const self = this;
    cam.once('camerafadeoutcomplete', function () {
      // remember where to put the player when they come back (on the door tile)
      self.scene.launch('interior', { building: b, returnTo: { c: self.player.gridX, r: self.player.gridY } });
      self.scene.pause();
    });
  }

  // called by the interior scene when the player exits
  resumeFromInterior(returnTo) {
    this._entering = false;
    this.player.gridX = returnTo.c; this.player.gridY = returnTo.r;
    this.playerSprite.x = this.tileToPx(returnTo.c);
    this.playerSprite.y = this.tileToPx(returnTo.r);
    this.syncFacer();
    this.player.state = 'IDLE';
    this.cameras.main.fadeIn(280, 16, 12, 9);
  }

  bump(dir) {
    // guard: only one bump at a time, and lock input during it so bumps can't stack/drift
    if (this.player.state !== 'IDLE') return;
    const d = DIRS[dir];
    const self = this;
    // origin is ALWAYS the true grid pixel, never the live sprite position
    const baseX = this.tileToPx(this.player.gridX);
    const baseY = this.tileToPx(this.player.gridY);
    this.playerSprite.x = baseX; this.playerSprite.y = baseY; // start from truth
    this.player.state = 'MOVING'; // lock so no new input/bump until this finishes
    this.tweens.add({
      targets: this.playerSprite,
      x: baseX + d.dx * 7, y: baseY + d.dy * 7, duration: 90, yoyo: true, ease: 'Quad.easeOut',
      onUpdate: function () { self.syncFacer(); },
      onComplete: function () {
        // hard snap back to the exact grid pixel — sprite can NEVER drift into a building
        self.playerSprite.x = baseX; self.playerSprite.y = baseY;
        self.player.state = 'IDLE';
        self.syncFacer();
      },
    });
  }

  updateFacer() {
    // place the facing notch on the correct side of the player
    const d = DIRS[this.player.facing];
    this.facer.setRotation({ up: 0, right: Math.PI / 2, down: Math.PI, left: -Math.PI / 2 }[this.player.facing]);
    this.facerOffset = { x: d.dx * CONFIG.TILE * 0.42, y: d.dy * CONFIG.TILE * 0.42 };
    this.syncFacer();
  }
  syncFacer() {
    if (!this.facerOffset) this.facerOffset = { x: 0, y: -CONFIG.TILE * 0.42 };
    this.facer.x = this.playerSprite.x + this.facerOffset.x;
    this.facer.y = this.playerSprite.y + this.facerOffset.y;
  }

  // ---- GUARDIAN STEP: random direction, validate, tween one tile ----
  guardianStep() {
    if (this.guardian.state !== 'IDLE') return;
    // REACTIVE LAYER (visual only): if the player is near, the dragon tends to pause and notice.
    // This biases the pause chance but does NOT alter the movement algorithm itself.
    const near = (Math.abs(this.player.gridX - this.guardian.gridX) + Math.abs(this.player.gridY - this.guardian.gridY)) <= 2;
    if (near) { this.reactToPlayer(true); if (Math.random() < 0.7) return; }
    else { this.reactToPlayer(false); }
    // architect spec: random directional AI, one tile, collision-aware, tween-based.
    // ~70% of the time it actually moves; otherwise it pauses a beat (feels natural).
    if (Math.random() < 0.3) return;
    const order = Phaser.Utils.Array.Shuffle(['up', 'down', 'left', 'right']);
    for (let i = 0; i < order.length; i++) {
      const d = DIRS[order[i]];
      const tc = this.guardian.gridX + d.dx, tr = this.guardian.gridY + d.dy;
      // walkable, not the player's tile, and stay near the island center (don't drift to edges forever)
      if (isWalkable(tc, tr) && !(tc === this.player.gridX && tr === this.player.gridY)) {
        return this.guardianMoveTo(tc, tr);
      }
    }
  }

  // VISUAL reaction to player proximity — glow brightens, dragon does a little perk-up.
  // Touches nothing in the grid/AI; purely cosmetic feedback.
  reactToPlayer(isNear) {
    if (isNear === this._wasNear) return; // only react on change
    this._wasNear = isNear;
    if (!this.dragonVisual) return;
    if (isNear) {
      if (this.guardianGlow) this.guardianGlow.setFillStyle(0xffd066, 0.5);
      // a quick perk-up hop (visual only)
      this.tweens.add({ targets: this.dragonVisual, y: this.dragonVisual.y - 5, duration: 160,
        yoyo: true, ease: 'Quad.easeOut' });
      if (this.hud) this.hud.textContent = '🐉 the dragon noticed you!';
    } else {
      if (this.guardianGlow) this.guardianGlow.setFillStyle(0xe8853d, 0.3);
      if (this.hud) this.hud.textContent = 'Hearth Island';
    }
  }

  guardianMoveTo(tc, tr) {
    this.guardian.state = 'MOVING';
    this.guardian.gridX = tc; this.guardian.gridY = tr;
    const nx = this.tileToPx(tc), ny = this.tileToPx(tr);
    const self = this;
    this.tweens.add({
      targets: this.guardianSprite, x: nx, y: ny,
      duration: CONFIG.GUARDIAN_MOVE_MS, ease: 'Sine.easeInOut',
      onComplete: function () {
        self.guardianSprite.x = self.tileToPx(self.guardian.gridX);
        self.guardianSprite.y = self.tileToPx(self.guardian.gridY);
        self.guardian.state = 'IDLE';
      },
    });
  }

  // ==== DAY/NIGHT TICK (cosmetic only — drives tint, fireflies, glows, dragon shimmer) ====
  tickDayNight() {
    // lazily start ambient audio once (after user gesture it will actually sound)
    if (!this._ambientInit) { Ambient.startBed(); this._ambientInit = true; }
    const elapsed = (Date.now() - (Save.data.dayStart || Date.now())) % DAYNIGHT.CYCLE_MS;
    const frac = elapsed / DAYNIGHT.CYCLE_MS;
    this.dayFrac = frac;
    const phase = TimeOfDay.phaseAt(frac);
    Ambient.setPhase(phase.id);

    // smoothly interpolate darkness within the phase for a gentle transition
    const span = phase.to - phase.from;
    const t = span > 0 ? (frac - phase.from) / span : 0;
    // ease darkness up toward night, down toward day
    let darkness = phase.dark;
    // blend toward the next phase's darkness for smoothness
    const idx = DAYNIGHT.PHASES.indexOf(phase);
    const next = DAYNIGHT.PHASES[(idx + 1) % DAYNIGHT.PHASES.length];
    darkness = phase.dark + (next.dark - phase.dark) * (t * t);

    // sky tint (multiply) deepens at night/dusk
    if (this.skyTint) {
      this.skyTint.setFillStyle(phase.tint);
      this.skyTint.setAlpha(darkness);
    }
    // warm wash at dawn/dusk
    if (this.skyWash) {
      const warm = (phase.id === 'dawn' || phase.id === 'dusk') ? 0.25 * (1 - Math.abs(t - 0.5) * 2) : 0;
      this.skyWash.setFillStyle(phase.id === 'dawn' ? 0xffd9a0 : 0xff8a5a);
      this.skyWash.setAlpha(Math.max(0, warm));
    }

    const isNight = phase.id === 'night';
    const nightAmt = isNight ? Math.min(1, 0.4 + t) : (phase.id === 'dusk' ? t * 0.6 : 0);

    // fireflies fade in at night
    if (this.fireflies) {
      for (let i = 0; i < this.fireflies.length; i++) this.fireflies[i].setAlpha(nightAmt * 0.9);
    }
    // window glows warm up in evening/night
    if (this.windowGlows) {
      for (let i = 0; i < this.windowGlows.length; i++) {
        // only lit if the building is unlocked
        const b = BUILDINGS[i];
        const lit = Save.isUnlocked(b.label) ? nightAmt * 0.6 : 0;
        this.windowGlows[i].setAlpha(lit);
      }
    }
    // dragons get a soft magical glow at night
    if (this.guardianGlow) this.guardianGlow.setAlpha(0.3 + nightAmt * 0.4);
    if (this.solGlow) this.solGlow.setAlpha(0.32 + nightAmt * 0.4);

    // update HUD with the time of day (only when not showing something else)
    if (this.hud && !this.dialogue.active && !this._leaving &&
        (this.hud.textContent === 'Hearth Island' || this._lastTodLabel === this.hud.textContent)) {
      const icon = { dawn: '\uD83C\uDF05', day: '\u2600\uFE0F', dusk: '\uD83C\uDF07', night: '\uD83C\uDF19' }[phase.id];
      this._lastTodLabel = 'Hearth Island  ' + icon + ' ' + phase.name;
      this.hud.textContent = this._lastTodLabel;
    }
  }

  update() {
    this.tickDayNight();
    // context-aware prompt: exit gate / Sol / Ember (UI only, no logic change)
    if (this.talkBtn) {
      const free = this.player.state === 'IDLE' && !this.dialogue.active && !this._entering && !this._leaving;
      const dd = (gx, gy) => Math.abs(this.player.gridX - gx) + Math.abs(this.player.gridY - gy);
      let label = null;
      if (free) {
        if (dd(EXIT_GATE.col, EXIT_GATE.row) <= 1) label = '\u2728 Leave island (E)';
        else if (this.sol && dd(this.sol.gridX, this.sol.gridY) <= 2) label = '\uD83D\uDD25 Talk to Sol (E)';
        else if (dd(this.guardian.gridX, this.guardian.gridY) <= 2) label = '\uD83D\uDC09 Talk to Ember (E)';
      }
      if (label) { this.talkBtn.textContent = label; this.talkBtn.style.display = 'block'; }
      else this.talkBtn.style.display = 'none';
    }
    // visual sync: keep shadows + glows under their entities (does NOT touch grid/movement)
    if (this.playerShadow) { this.playerShadow.x = this.playerSprite.x; this.playerShadow.y = this.playerSprite.y + CONFIG.TILE * 0.28; }
    if (this.guardianShadow) { this.guardianShadow.x = this.guardianSprite.x; this.guardianShadow.y = this.guardianSprite.y + CONFIG.TILE * 0.26; }
    if (this.guardianGlow) { this.guardianGlow.x = this.guardianSprite.x; this.guardianGlow.y = this.guardianSprite.y; }

    // SAFETY: the player must NEVER occupy a blocked tile. If they do, snap to a safe tile.
    if (!isWalkable(this.player.gridX, this.player.gridY)) {
      console.warn('[BUG] player on blocked tile', this.player.gridX, this.player.gridY,
        '-> snapping to safe tile');
      // find nearest safe tile (spiral out)
      let safe = null;
      for (let r = 1; r < 8 && !safe; r++) {
        for (let dy = -r; dy <= r && !safe; dy++) {
          for (let dx = -r; dx <= r && !safe; dx++) {
            const c = this.player.gridX + dx, rr = this.player.gridY + dy;
            if (isWalkable(c, rr)) safe = { c: c, r: rr };
          }
        }
      }
      if (safe) {
        this.player.gridX = safe.c; this.player.gridY = safe.r;
        this.playerSprite.x = this.tileToPx(safe.c);
        this.playerSprite.y = this.tileToPx(safe.r);
      }
    }
    // convert held direction (key or pad) into ONE discrete step when IDLE
    let dir = this.heldDir;
    if (this.cursors.up.isDown) dir = 'up';
    else if (this.cursors.down.isDown) dir = 'down';
    else if (this.cursors.left.isDown) dir = 'left';
    else if (this.cursors.right.isDown) dir = 'right';
    if (dir && this.player.state === 'IDLE') this.tryMove(dir);
  }
}

// ---- INTERIOR SCENE (simple single room; entered via building doors) -------
class InteriorScene extends Phaser.Scene {
  constructor() { super('interior'); }

  init(data) { this.building = data.building; this.returnTo = data.returnTo; }

  create() {
    const T = CONFIG.TILE;
    const W = this.scale.width, H = this.scale.height;
    const b = this.building;
    this.cameras.main.setBackgroundColor('#1a1410');

    // room dimensions (a cozy interior, centered)
    const roomW = Math.min(W * 0.82, 360), roomH = Math.min(H * 0.6, 360);
    const rx = (W - roomW) / 2, ry = (H - roomH) / 2;

    const g = this.add.graphics();
    // floor (wood plank look via stripes, tinted by building color)
    const floorBase = Phaser.Display.Color.IntegerToColor(b.color).darken(40).color;
    g.fillStyle(floorBase, 1);
    g.fillRect(rx, ry, roomW, roomH);
    g.fillStyle(0x000000, 0.12);
    for (let y = ry; y < ry + roomH; y += 22) { g.fillRect(rx, y, roomW, 2); }
    // back wall (upper third, lighter)
    const wallCol = Phaser.Display.Color.IntegerToColor(b.color).darken(20).color;
    g.fillStyle(wallCol, 1);
    g.fillRect(rx, ry, roomW, roomH * 0.3);
    // wall trim
    g.fillStyle(Phaser.Display.Color.IntegerToColor(b.color).lighten(10).color, 1);
    g.fillRect(rx, ry + roomH * 0.3 - 4, roomW, 4);
    // room border
    g.lineStyle(3, 0x000000, 0.4);
    g.strokeRect(rx, ry, roomW, roomH);
    // a rug
    g.fillStyle(Phaser.Display.Color.IntegerToColor(b.color).lighten(14).color, 0.5);
    g.fillEllipse(W / 2, ry + roomH * 0.62, roomW * 0.5, roomH * 0.3);
    // a door at the bottom (exit marker)
    g.fillStyle(0x2a1c12, 1);
    g.fillRect(W / 2 - 16, ry + roomH - 30, 32, 30);
    g.fillStyle(0xE8C56A, 0.9);
    g.fillCircle(W / 2 + 8, ry + roomH - 15, 2);

    // title
    this.add.text(W / 2, ry - 18, b.label, { fontFamily: 'system-ui', fontSize: '20px',
      color: '#EDE3D2', stroke: '#000000', strokeThickness: 4, fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(W / 2, ry + 18, 'Inside the ' + b.label, { fontFamily: 'system-ui', fontSize: '13px',
      color: '#C9BCA6' }).setOrigin(0.5);

    // player avatar inside (near the door) — matches the chosen hero
    const pSh = this.add.ellipse(W / 2, ry + roomH - 44 + T * 0.28, T * 0.5, T * 0.22, 0x000000, 0.3);
    const hero = Roster.active();
    const look = (hero && hero.look) ? hero.look : { skin:0, hairColor:0, hairStyle:0, eyes:0, outfit:0, emblem:0 };
    buildHeroAvatar(this, W / 2, ry + roomH - 44, look, T);

    // exit prompt
    this.add.text(W / 2, ry + roomH + 24, 'Press E or ESC to leave  ·  or tap here',
      { fontFamily: 'system-ui', fontSize: '13px', color: '#E8853D' }).setOrigin(0.5)
      .setInteractive({ useHandCursor: true })
      .on('pointerdown', function () { this.exit(); }, this);

    // keys
    this.input.keyboard.on('keydown-E', function () { this.exit(); }, this);
    this.input.keyboard.on('keydown-ESC', function () { this.exit(); }, this);
    // tap anywhere on the door also exits
    this.input.on('pointerdown', function (p) {
      if (p.y > ry + roomH - 40 && Math.abs(p.x - W / 2) < 40) this.exit();
    }, this);

    this.cameras.main.fadeIn(280, 16, 12, 9);
    this._exiting = false;
    // update HUD
    const hud = document.getElementById('hud'); if (hud) hud.textContent = '🚪 ' + b.label;
  }

  exit() {
    if (this._exiting) return;
    this._exiting = true;
    const self = this;
    this.cameras.main.fadeOut(280, 16, 12, 9);
    this.cameras.main.once('camerafadeoutcomplete', function () {
      const island = self.scene.get('island');
      self.scene.resume('island');
      if (island && island.resumeFromInterior) island.resumeFromInterior(self.returnTo);
      const hud = document.getElementById('hud'); if (hud) hud.textContent = 'Hearth Island';
      self.scene.stop();
    });
  }
}

// ---- HERO SCREENS CONTROLLER ----------------------------------------------
let game = null;
function startGameWithHero(heroId) {
  Roster.setActive(heroId);
  Save.load(heroId); // load this hero's adventure
  document.getElementById('heroOverlay').style.display = 'none';
  if (game) return; // already running
  game = new Phaser.Game({
    type: Phaser.AUTO, parent: 'game', backgroundColor: '#1a1410',
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH,
      width: window.innerWidth, height: window.innerHeight },
    pixelArt: false, scene: [IslandScene, InteriorScene],
  });
}

const HeroUI = {
  MAX_SLOTS: 4,
  draft: null,
  init: function () {
    Roster.load();
    this.renderSelect();
    document.getElementById('creatorBack').addEventListener('click', this.showSelect.bind(this));
    document.getElementById('creatorDone').addEventListener('click', this.finishCreate.bind(this));
  },
  showSelect: function () {
    document.getElementById('heroCreate').style.display = 'none';
    document.getElementById('heroSelect').style.display = 'block';
    this.renderSelect();
  },
  renderSelect: function () {
    const wrap = document.getElementById('heroSlots');
    wrap.innerHTML = '';
    const heroes = Roster.list();
    heroes.forEach(function (h) {
      const slot = document.createElement('div');
      slot.className = 'hero-slot filled';
      const g = GUARDIAN_CHOICES[h.guardian] || GUARDIAN_CHOICES.ember;
      slot.innerHTML = '<div class="hero-slot-portrait" id="port-' + h.id + '"></div>' +
        '<div class="hero-slot-info"><div class="hero-slot-name">' + escapeHtml(h.name) + '</div>' +
        '<div class="hero-slot-title">' + escapeHtml(h.title || 'Hearth Keeper') + '</div></div>' +
        '<div class="hero-slot-guardian">' + g.emoji + '</div>' +
        '<button class="hero-slot-del" data-del="' + h.id + '">🗑</button>';
      slot.addEventListener('click', function (e) {
        if (e.target.getAttribute('data-del')) return;
        startGameWithHero(h.id);
      });
      wrap.appendChild(slot);
      // draw a tiny avatar portrait via canvas (cheap, no Phaser needed)
      drawHeroPortrait(document.getElementById('port-' + h.id), h.look);
    });
    // delete buttons
    wrap.querySelectorAll('[data-del]').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (confirm('Delete this hero and their adventure?')) { Roster.remove(btn.getAttribute('data-del')); HeroUI.renderSelect(); }
      });
    });
    // empty slots / create button
    if (heroes.length < this.MAX_SLOTS) {
      const add = document.createElement('div');
      add.className = 'hero-slot empty';
      add.textContent = '＋ Create a new hero';
      add.addEventListener('click', this.showCreate.bind(this));
      wrap.appendChild(add);
    }
  },
  showCreate: function () {
    this.draft = { name: '', title: 'Hearth Keeper', guardian: 'ember',
      look: { skin: 0, hairColor: 0, hairStyle: 0, eyes: 0, outfit: 0, emblem: 0 } };
    document.getElementById('heroSelect').style.display = 'none';
    document.getElementById('heroCreate').style.display = 'block';
    document.getElementById('heroNameInput').value = '';
    this.renderControls();
    this.renderGuardianPick();
    this.renderPreview();
  },
  renderControls: function () {
    const defs = [
      { key: 'skin', label: 'Skin' }, { key: 'hairStyle', label: 'Hair' },
      { key: 'hairColor', label: 'Color' }, { key: 'eyes', label: 'Eyes' },
      { key: 'outfit', label: 'Outfit' }, { key: 'emblem', label: 'Emblem' },
    ];
    const wrap = document.getElementById('creatorControls');
    wrap.innerHTML = '';
    const self = this;
    defs.forEach(function (d) {
      const opts = HERO_OPTS[d.key];
      const row = document.createElement('div');
      row.className = 'creator-ctl';
      const valText = (d.key === 'hairStyle') ? HERO_OPTS.hairStyle[self.draft.look[d.key]] : ('' + (self.draft.look[d.key] + 1));
      row.innerHTML = '<span class="creator-ctl-label">' + d.label + '</span>' +
        '<button class="creator-arrow" data-dir="-1">‹</button>' +
        '<span class="creator-ctl-val" id="val-' + d.key + '">' + valText + '</span>' +
        '<button class="creator-arrow" data-dir="1">›</button>';
      row.querySelectorAll('.creator-arrow').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const dir = parseInt(btn.getAttribute('data-dir'), 10);
          const n = opts.length;
          self.draft.look[d.key] = (self.draft.look[d.key] + dir + n) % n;
          document.getElementById('val-' + d.key).textContent = (d.key === 'hairStyle') ? HERO_OPTS.hairStyle[self.draft.look[d.key]] : ('' + (self.draft.look[d.key] + 1));
          self.renderPreview();
        });
      });
      wrap.appendChild(row);
    });
  },
  renderGuardianPick: function () {
    const wrap = document.getElementById('guardianPick');
    wrap.innerHTML = '';
    const self = this;
    Object.keys(GUARDIAN_CHOICES).forEach(function (gid) {
      const g = GUARDIAN_CHOICES[gid];
      const el = document.createElement('div');
      el.className = 'guardian-opt' + (self.draft.guardian === gid ? ' sel' : '');
      el.textContent = g.emoji;
      el.addEventListener('click', function () {
        self.draft.guardian = gid;
        self.renderGuardianPick();
        document.getElementById('guardianBlurb').textContent = g.name + ' — ' + g.blurb;
      });
      wrap.appendChild(el);
    });
    document.getElementById('guardianBlurb').textContent = GUARDIAN_CHOICES[self.draft.guardian].name + ' — ' + GUARDIAN_CHOICES[self.draft.guardian].blurb;
  },
  renderPreview: function () {
    drawHeroPortrait(document.getElementById('creatorPreview'), this.draft.look, true);
  },
  finishCreate: function () {
    const name = (document.getElementById('heroNameInput').value || '').trim() || 'Hero';
    this.draft.name = name;
    // title by guardian flavor
    const titles = { sol: 'Hearth Keeper', ember: 'Dragon Friend', thorn: 'Forest Friend', luna: 'Moon Keeper' };
    this.draft.title = titles[this.draft.guardian] || 'Hearth Keeper';
    const hero = Roster.add(this.draft);
    startGameWithHero(hero.id);
  },
};

function escapeHtml(s) { return ('' + s).replace(/[&<>"']/g, function (c) { return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]; }); }

// Draw a hero portrait onto a DOM element using a small canvas (matches buildHeroAvatar palette).
function drawHeroPortrait(el, look, big) {
  if (!el) return;
  const size = big ? 130 : 56;
  let cv = el.querySelector('canvas');
  if (!cv) { cv = document.createElement('canvas'); el.appendChild(cv); }
  cv.width = size; cv.height = size;
  const x = cv.getContext('2d');
  const HC = ['#ffe0bd','#f1c27d','#e0ac69','#c68642','#8d5524'];
  const HAIR = ['#2c1b10','#6b3a1f','#c8a24a','#e8853d','#d94f6e','#6e5fd8','#ededed'];
  const OUT = ['#3a72d8','#d94f6e','#2c9e6e','#e8853d','#8a5fd8','#444c5e'];
  const EYE = ['#4a3526','#2c6e49','#2a5fd0','#6e5fd8'];
  const EMB = ['#ffd98a','#ff6b3d','#7ed0ff','#b8ff7e','#ff7eda'];
  const styles = ['short','long','ponytail','bun','spiky'];
  const cx = size/2, cy = size*0.42, R = size*0.22;
  x.clearRect(0,0,size,size);
  // body
  x.fillStyle = OUT[look.outfit % OUT.length];
  x.beginPath(); x.ellipse(cx, cy + R*1.5, R*1.3, R*1.4, 0, 0, Math.PI*2); x.fill();
  // emblem
  x.fillStyle = EMB[look.emblem % EMB.length];
  x.beginPath(); x.arc(cx, cy + R*1.4, R*0.32, 0, Math.PI*2); x.fill();
  // hair back (long/ponytail/bun)
  const style = styles[look.hairStyle % styles.length];
  x.fillStyle = HAIR[look.hairColor % HAIR.length];
  if (style==='long'){ x.beginPath(); x.ellipse(cx, cy, R*1.5, R*1.7, 0,0,Math.PI*2); x.fill(); }
  // head
  x.fillStyle = HC[look.skin % HC.length];
  x.beginPath(); x.arc(cx, cy, R, 0, Math.PI*2); x.fill();
  // eyes
  x.fillStyle = EYE[look.eyes % EYE.length];
  x.beginPath(); x.arc(cx - R*0.35, cy, R*0.14, 0, Math.PI*2); x.fill();
  x.beginPath(); x.arc(cx + R*0.35, cy, R*0.14, 0, Math.PI*2); x.fill();
  // hair front
  x.fillStyle = HAIR[look.hairColor % HAIR.length];
  if (style==='spiky'){
    for(let i=-2;i<=2;i++){ x.beginPath(); x.moveTo(cx+i*R*0.4, cy-R*0.9); x.lineTo(cx+i*R*0.4-R*0.2, cy-R*0.3); x.lineTo(cx+i*R*0.4+R*0.2, cy-R*0.3); x.fill(); }
    x.beginPath(); x.ellipse(cx, cy-R*0.6, R*0.95, R*0.5, 0,0,Math.PI*2); x.fill();
  } else if (style==='bun'){
    x.beginPath(); x.arc(cx, cy-R*1.2, R*0.45, 0, Math.PI*2); x.fill();
    x.beginPath(); x.ellipse(cx, cy-R*0.6, R*0.95, R*0.55, 0,0,Math.PI*2); x.fill();
  } else if (style==='ponytail'){
    x.beginPath(); x.ellipse(cx+R*0.85, cy, R*0.35, R*0.7, 0,0,Math.PI*2); x.fill();
    x.beginPath(); x.ellipse(cx, cy-R*0.6, R*0.95, R*0.55, 0,0,Math.PI*2); x.fill();
  } else { // short / long front
    x.beginPath(); x.ellipse(cx, cy-R*0.55, R*0.98, R*0.6, 0,0,Math.PI*2); x.fill();
  }
}

document.addEventListener('DOMContentLoaded', function () { HeroUI.init(); });

// ---- lightweight self-test (logged to console; proves grid logic) ---------
(function selfTest() {
  const results = [];
  function ok(name, cond) { results.push((cond ? 'PASS ' : 'FAIL ') + name); }
  ok('building footprint blocked', WORLD.blocked['3,2'] && WORLD.blocked['4,3'] && WORLD.blocked['3,3'] && WORLD.blocked['4,2']);
  ok('open tile is walkable', isWalkable(7, 10) === true);
  ok('building not walkable', isWalkable(3, 2) === false && isWalkable(4, 3) === false);
  ok('out of bounds not walkable', isWalkable(-1, 5) === false && isWalkable(99, 5) === false);
  ok('six 2x2 = 24 blocked tiles', Object.keys(WORLD.blocked).length === 24);
  console.log('[Island self-test]\n' + results.join('\n'));
})();
